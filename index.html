<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Dot Production - Classic Games</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-pink: #ff2a85;
            --neon-blue: #00e5ff;
            --neon-green: #00ffaa;
            --neon-purple: #9d00ff;
            --neon-yellow: #ffeb3b;
            --bg-dark: #090a0f;
            --arcade-dark: #1a1a24;
            --arcade-panel: #242533;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            perspective: 1200px;
        }

        /* ----- PREMIUM VAPORWAVE BACKGROUND ----- */
        .vapor-bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 100%, #3a1c4b 0%, var(--bg-dark) 60%);
            z-index: -3;
        }

        .stars {
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 80px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 160px 120px, #ddd, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.3;
            z-index: -2;
            animation: twinkle 4s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; }
            100% { opacity: 0.5; }
        }

        .sun {
            position: absolute;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 400px;
            background: linear-gradient(180deg, var(--neon-yellow) 0%, #ff007c 100%);
            border-radius: 50%;
            box-shadow: 0 0 80px rgba(255, 0, 124, 0.6);
            /* Premium Sliced Sun Effect */
            -webkit-mask-image: linear-gradient(to bottom, 
                black 0%, black 45%, 
                transparent 45%, transparent 48%, 
                black 48%, black 55%, 
                transparent 55%, transparent 59%, 
                black 59%, black 68%, 
                transparent 68%, transparent 73%, 
                black 73%, black 84%, 
                transparent 84%, transparent 90%, 
                black 90%, black 100%);
            mask-image: linear-gradient(to bottom, 
                black 0%, black 45%, 
                transparent 45%, transparent 48%, 
                black 48%, black 55%, 
                transparent 55%, transparent 59%, 
                black 59%, black 68%, 
                transparent 68%, transparent 73%, 
                black 73%, black 84%, 
                transparent 84%, transparent 90%, 
                black 90%, black 100%);
            z-index: -2;
        }

        .sun-glow {
            position: absolute;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            width: 420px;
            height: 420px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,0,124,0.4) 0%, transparent 70%);
            z-index: -3;
        }

        .grid-floor {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 300vw;
            height: 40vh;
            background-image: 
                linear-gradient(var(--neon-blue) 1px, transparent 1px),
                linear-gradient(90deg, var(--neon-pink) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: translateX(-50%) rotateX(75deg);
            transform-origin: top;
            animation: gridMove 1s linear infinite;
            z-index: -1;
            /* Horizon fade */
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 40%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 40%);
        }

        @keyframes gridMove {
            from { background-position: 0 0; }
            to { background-position: 0 60px; }
        }

        .palm-tree {
            position: absolute;
            bottom: 10%;
            width: 250px;
            height: 350px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path fill="%23090a0f" stroke="%2300e5ff" stroke-width="4" d="M303.4 153.2c-15.6-13.3-36.9-20.9-63.5-17.6-28.7 3.6-54.6 20.3-73.4 44.5-8.3-26.6-2-55.6 15.5-77.9 14.6-18.7 36.2-31.5 60.1-34.9 22.8-3.2 46.1 2.5 66.1 14.6 14.1 8.5 26.6 20.3 36.8 34.3 6.9 9.5 12.5 20.1 16.8 31.4-12.7-22.1-32.4-40.4-55.9-52.1-23.7-11.8-51.5-16.1-77.4-10.9-25.9 5.2-50.1 18.5-68.8 37.1-15.3-22.5-15.9-51.4-2.1-74.6 12.3-20.7 33.6-35.3 58-40.4 23.3-4.8 48.4-1.2 69.5 10.1 18.3 9.8 33.9 24.1 46.1 41.2 9.6 13.5 17.2 28.5 22.5 44.4-12.8-21-31.5-38.9-54.3-50.9-23.1-12.2-50.3-17.5-75.9-13.4-25.3 4-49 16.3-67.9 34.3-21.7 20.8-35.6 48.4-39.7 78.4-4.1 30.1 1.6 61.2 16 88.5 12.4 23.5 31.1 43.4 53.6 57.3 22.1 13.6 48.2 21.1 74.3 20.9 25.9-.2 51.5-8 73.9-21.9 22.2-13.8 41-33.5 53.5-56.9 14.2-26.7 20.1-57.4 16.3-87.1-3.8-29.6-17.5-57.1-38.9-78.2-19.3-19.1-43.5-32.1-69.5-36.8-25.7-4.6-53.1-.3-76.4 12-23.2 12.3-42.5 30.6-55.4 52.4-5.3-17.8-5.3-37.1-.1-54.9 5.2-17.8 15.3-33.8 28.9-46.3 13.8-12.7 30.9-21.6 49.7-25.5 18.8-3.9 39.1-3 57.5 3 17.6 5.8 33.7 16.1 46.8 29.5 12.9 13.3 22.9 29.4 29.2 47.1 2.3-19.2-.8-38.9-9.1-56.5-8.4-17.8-21.9-33-38.4-43.9-16.7-11-36.4-17.3-56.8-18.1-20.5-.8-41.2 4.1-59.5 14.3-18.3 10.2-33.8 25.1-44.5 43-9.5-17.3-12.5-37.3-8.8-56.7 3.8-19.4 13.8-37.1 28.3-51.1 14.6-14 32.8-23.8 52.8-28 20-4.2 41.5-3.2 60.9 3.2 18.6 6.1 35.5 17.1 49.2 31.3 13.5 13.9 23.9 30.7 30.5 49.2M233.1 343.8c3.2 25.8 7.3 51.5 12.3 77 5.1 25.4 11.2 50.7 18.2 75.8 1.4 5.1 7.2 8.3 12.3 6.9 5.1-1.4 8.3-7.2 6.9-12.3-6.9-25-12.9-50.2-18-75.5-5-25.4-9.1-51-12.2-76.8-1.5-12.7-2.6-25.5-3.3-38.3-.7-12.8-1.1-25.6-1.1-38.5 0-12.8.4-25.6 1.1-38.5.7-12.8 1.8-25.6 3.3-38.3 5.4-44.8 14.5-89.1 27.2-132.5 1.4-4.8-1.4-9.9-6.2-11.3-4.8-1.4-9.9 1.4-11.3 6.2-12.9 43.8-22.1 88.5-27.6 133.7-1.5 12.8-2.6 25.7-3.4 38.6-.8 12.9-1.2 25.8-1.2 38.7 0 12.9.4 25.8 1.2 38.7.8 12.9 1.9 25.8 3.4 38.6 1.1 10.3 2.5 20.6 4.1 30.8z"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            filter: drop-shadow(0 0 15px var(--neon-blue));
            z-index: -1;
            opacity: 0.85;
        }
        .palm-left { left: 5%; transform: scaleX(-1); }
        .palm-right { right: 2%; filter: drop-shadow(0 0 15px var(--neon-pink)); stroke: var(--neon-pink); }

        /* ----- PREMIUM ARCADE CONSOLE ----- */
        .console-unit {
            position: relative;
            width: 150%;
            max-width: 500px;
            background: linear-gradient(145deg, var(--arcade-dark) 0%, #0d0d12 100%);
            border: 2px solid #3a3a4a;
            border-radius: 24px 24px 16px 16px;
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.9), 
                inset 0 2px 2px rgba(255,255,255,0.1), 
                0 0 30px rgba(0, 229, 255, 0.15),
                0 0 0 8px #111; /* Outer thick casing */
            display: flex;
            flex-direction: column;
            animation: consoleFloat 5s ease-in-out infinite;
        }

        /* Neon edge glow */
        .console-unit::before {
            content: '';
            position: absolute;
            inset: 0px;
            border-radius: 26px 26px 18px 18px;
            background: linear-gradient(180deg, var(--neon-blue), transparent, var(--neon-pink));
            z-index: -1;
            opacity: 0.5;
            filter: blur(8px);
        }

        @keyframes consoleFloat {
            0%, 100% { transform: translateY(0) rotateX(5deg); }
            50% { transform: translateY(-10px) rotateX(2deg); }
        }

        .console-header {
            padding: 20px;
            background: linear-gradient(180deg, #2a2a35 0%, var(--arcade-dark) 100%);
            text-align: center;
            border-bottom: 3px solid #000;
            border-radius: 22px 22px 0 0;
            box-shadow: inset 0 2px 0 rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }

        .logo-text {
            font-family: 'Permanent Marker', cursive;
            font-size: 32px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 4px 0px rgba(0,0,0,0.8));
            letter-spacing: 2px;
            position: relative;
            z-index: 2;
        }

        .screen-area {
            padding: 30px 25px;
            background: #000;
            border-left: 4px solid #333;
            border-right: 4px solid #333;
            position: relative;
        }

        .crt-screen {
            background: #050608;
            height: 280px;
            border: 12px solid #1a1a24;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 
                inset 0 0 60px rgba(0,0,0,1),
                0 0 15px rgba(0, 229, 255, 0.2);
            display: flex;
            flex-direction: column;
        }

        /* Glass Reflection Overlay */
        .crt-screen::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 40%);
            z-index: 15;
            pointer-events: none;
            border-radius: 8px;
        }

        /* Scanlines Effect */
        .crt-screen::after {
            content: " ";
            display: block;
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            z-index: 10;
            background-size: 100% 4px, 4px 100%;
            pointer-events: none;
            animation: flicker 0.12s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.9; }
            100% { opacity: 1; }
        }

        .screen-title {
            color: var(--neon-yellow);
            font-size: 12px;
            text-align: center;
            margin: 15px 0;
            letter-spacing: 3px;
            text-shadow: 0 0 8px var(--neon-yellow), 0 0 2px #fff;
            z-index: 5;
        }

        .game-list-container {
            flex-grow: 1;
            overflow-y: auto;
            scroll-behavior: smooth;
            padding: 0 20px 40px 20px;
            z-index: 5;
        }
        .game-list-container::-webkit-scrollbar { width: 0; }

        ul { list-style: none; padding: 0; margin: 0; }
        li {
            padding: 14px 10px;
            font-size: 11px;
            color: #4a5568;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 1px;
        }
        li.selected {
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
            transform: translateX(15px) scale(1.05);
            background: linear-gradient(90deg, rgba(0, 229, 255, 0.1), transparent);
            border-radius: 4px;
        }
        li.selected::before {
            content: "▶";
            position: absolute;
            left: -18px;
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
            animation: blink 0.5s infinite alternate;
        }

        @keyframes blink { 
            from { opacity: 0.4; }
            to { opacity: 1; } 
        }

        /* ----- PREMIUM CONTROLS ----- */
        .control-pad {
            background: linear-gradient(180deg, var(--arcade-panel) 0%, #15151e 100%);
            padding: 30px 30px;
            border-top: 4px solid #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 0 0 14px 14px;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.5);
            position: relative;
        }
        
        /* Subtle texture for the control panel */
        .control-pad::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 10px 10px;
            opacity: 0.2;
            pointer-events: none;
        }

        .d-pad {
            display: grid;
            grid-template-areas: ". up ." "left . right" ". down .";
            gap: 4px;
            background: #111;
            padding: 8px;
            border-radius: 50%;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8), 0 2px 0 rgba(255,255,255,0.05);
            position: relative;
            z-index: 2;
        }

        .btn-dir {
            width: 40px; height: 40px;
            background: linear-gradient(180deg, #3a3a4a 0%, #222 100%);
            border: 2px solid #111;
            color: #888; font-size: 14px;
            border-radius: 6px; cursor: pointer;
            box-shadow: 0 4px 0 #0a0a0f, inset 0 1px 1px rgba(255,255,255,0.1);
            transition: 0.1s;
            display: flex; justify-content: center; align-items: center;
        }
        .btn-dir:active { 
            transform: translateY(4px); 
            box-shadow: 0 0px 0 #0a0a0f, inset 0 2px 4px rgba(0,0,0,0.8); 
            background: #222;
            color: var(--neon-blue);
            text-shadow: 0 0 5px var(--neon-blue);
        }

        .action-btns { 
            display: flex; gap: 20px; position: relative; z-index: 2;
        }
        .btn-main {
            width: 70px; height: 70px;
            border-radius: 50%; 
            border: 4px solid #111;
            font-family: inherit; font-size: 10px; cursor: pointer;
            box-shadow: 0 6px 0 #0a0a0f, inset 0 2px 5px rgba(255,255,255,0.3);
            transition: 0.1s;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            letter-spacing: 1px;
        }
        .btn-start { 
            background: radial-gradient(circle at 30% 30%, #ff5e9f, var(--neon-pink) 60%, #a6004c); 
            color: #fff; 
        }
        .btn-info { 
            background: radial-gradient(circle at 30% 30%, #4dd2ff, var(--neon-blue) 60%, #007799); 
            color: #fff; 
        }
        .btn-main:active { 
            transform: translateY(6px); 
            box-shadow: 0 0px 0 #0a0a0f, inset 0 4px 8px rgba(0,0,0,0.6); 
        }

        /* ----- POPUPS ----- */
        #banner {
            position: fixed; inset: 0;
            background: rgba(255, 42, 133, 0.95);
            z-index: 1000; display: none;
            justify-content: center; align-items: center;
            flex-direction: column;
            color: #fff; font-size: 28px;
            text-shadow: 4px 4px 0 #000;
            backdrop-filter: blur(5px);
        }
        #banner.active { display: flex; animation: flash 0.15s steps(2) infinite; }
        @keyframes flash { from { background: rgba(255, 42, 133, 0.95); } to { background: rgba(0, 229, 255, 0.95); } }

        .game-popup {
            position: fixed; inset: 0; background: #000;
            z-index: 2000; display: none; flex-direction: column;
        }
        .game-popup.active { display: flex; }
        iframe { flex-grow: 1; border: none; }
        
        .game-nav {
            background: #0b0c10; padding: 12px 25px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--neon-pink);
            box-shadow: 0 4px 20px rgba(255, 42, 133, 0.3);
        }

        .btn-exit {
            background: transparent; color: var(--neon-pink); 
            border: 2px solid var(--neon-pink);
            padding: 8px 18px; font-family: inherit; font-size: 10px;
            cursor: pointer; border-radius: 4px;
            transition: 0.2s;
        }
        .btn-exit:hover {
            background: var(--neon-pink);
            color: #000;
            box-shadow: 0 0 15px var(--neon-pink);
        }
        
        .hidden { display: none !important; }
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: flex; justify-content: center; align-items: center; z-index: 3000;
            backdrop-filter: blur(4px);
        }
        .modal-box {
            background: linear-gradient(135deg, #1a1a24, #0d0d12);
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.3), inset 0 0 20px rgba(0,0,0,0.8);
            padding: 35px; border-radius: 12px; text-align: center;
            width: 85%; max-width: 320px;
        }
    </style>
</head>
<body>

    <div class="vapor-bg"></div>
    <div class="stars"></div>
    <div class="sun-glow"></div>
    <div class="sun"></div>
    <div class="grid-floor"></div>
    <div class="palm-tree palm-left"></div>
    <div class="palm-tree palm-right"></div>

    <!-- Banner -->
    <div id="banner">
        <div id="banner-text">LOADING...</div>
    </div>

    <!-- Info Modal -->
    <div id="info-modal" class="modal hidden">
        <div class="modal-box">
            <h2 style="color:var(--neon-yellow); font-size:14px;">CONTROLS</h2>
            <div style="font-size:10px; line-height:2; margin: 20px 0; color: #aaa;">
                UP/DOWN: NAVIGATE<br>
                START: PLAY GAME<br>
                ESC: QUIT
            </div>
            <button class="btn-main btn-info" onclick="closeInfo()" style="width:100%; height:40px; border-radius:5px;">OK</button>
        </div>
    </div>

    <!-- Console -->
    <div class="console-unit">
        <div class="console-header">
            <div class="logo-text">TEAM DOT PRODUCTION</div>
        </div>

        <div class="screen-area">
            <div class="crt-screen">
                <div class="screen-title">SELECT GAMES</div>
                <div class="game-list-container" id="scroll-container">
                    <ul id="game-list">
                        <li data-url="kadetblast.html" class="selected">Kadet Blast</li>
                        <li data-url="1941.html">1941 Re-Boot</li>
                        <li data-url="typing.html">Typing Interstellar</li>
                        <li data-url="combat.html">Mecha Combat</li>
                        <li data-url="spaceattack.html">Space Attack</li>
                        <li data-url="overdrive.html">Overdrive</li>
                        <li data-url="snake.html">Snake Retro</li>
                        <li data-url="snooker.html">Snooker Club</li>
                        <li data-url="neoncarom.html">Neon Carom</li>
                        <li data-url="tetris.html">Tetris Block</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="control-pad">
            <div class="d-pad">
                <button class="btn-dir" style="grid-area: up" onclick="moveUp()">▲</button>
                <button class="btn-dir" style="grid-area: down" onclick="moveDown()">▼</button>
            </div>
            <div class="action-btns">
                <button class="btn-main btn-info" onclick="showInfo()">INFO</button>
                <button class="btn-main btn-start" onclick="launchGame()">START</button>
            </div>
        </div>
    </div>

    <!-- Game View -->
    <div id="game-popup" class="game-popup">
        <div class="game-nav">
            <div id="active-title" style="color:var(--neon-blue); font-size:10px;">GAME_TITLE</div>
            <button class="btn-exit" onclick="exitGame()">EXIT</button>
        </div>
        <iframe id="game-frame"></iframe>
    </div>

    <script>
        const items = document.querySelectorAll('#game-list li');
        const scrollBox = document.getElementById('scroll-container');
        let index = 0;

        // --- Audio Logic ---
        function beep(freq, type = 'square', vol = 0.1, duration = 0.1) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            g.gain.setValueAtTime(vol, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + duration);
            osc.connect(g);
            g.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + duration);
        }

        function updateUI() {
            items.forEach((item, i) => {
                item.classList.toggle('selected', i === index);
            });

            const active = items[index];
            scrollBox.scrollTo({
                top: active.offsetTop - scrollBox.offsetHeight / 2 + active.offsetHeight / 2,
                behavior: 'smooth'
            });
            beep(200, 'square', 0.05, 0.05);
        }

        function moveUp() { if(index > 0) { index--; updateUI(); } }
        function moveDown() { if(index < items.length - 1) { index++; updateUI(); } }

        function showInfo() { beep(400); document.getElementById('info-modal').classList.remove('hidden'); }
        function closeInfo() { beep(200); document.getElementById('info-modal').classList.add('hidden'); }

        function launchGame() {
            const game = items[index];
            const url = game.getAttribute('data-url');
            const title = game.innerText;

            beep(600, 'sawtooth', 0.1, 0.5); // Start sound
            
            const banner = document.getElementById('banner');
            document.getElementById('banner-text').innerText = title + " START!";
            banner.classList.add('active');

            setTimeout(() => {
                banner.classList.remove('active');
                document.getElementById('active-title').innerText = title;
                document.getElementById('game-frame').src = url;
                document.getElementById('game-popup').classList.add('active');
            }, 1200);
        }

        function exitGame() {
            beep(100, 'sine', 0.1, 0.2);
            document.getElementById('game-popup').classList.remove('active');
            document.getElementById('game-frame').src = "";
        }

        // Keyboard support
        window.addEventListener('keydown', (e) => {
            if(document.getElementById('game-popup').classList.contains('active')) {
                if(e.key === "Escape") exitGame();
                return;
            }

            if(e.key === "ArrowUp") moveUp();
            if(e.key === "ArrowDown") moveDown();
            if(e.key === "Enter" || e.key === " ") launchGame();
            if(e.key === "Escape") closeInfo();
        });

        // Click support
        items.forEach((item, i) => {
            item.onclick = () => { index = i; updateUI(); };
        });

        updateUI();
    </script>
</body>
</html>
