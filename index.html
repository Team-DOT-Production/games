<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcade Ultimate Collection - PREMIUM Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-green: #00ff00;
            --arcade-red: #ff004c;
            --retro-blue: #00d4ff;
            --capcom-yellow: #ffcc00;
            --panel-bg: #2b2b2b;
            --screen-bg: #0a0a0a;
        }

        body {
            background: linear-gradient(180deg, #020024 0%, #003366 50%, #0088cc 100%);
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            overflow: hidden;
        }

        .grid-floor {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 30%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .machine-container {
            width: 90%;
            max-width: 550px;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.3), 0 20px 40px rgba(0,0,0,0.5);
            background: #111;
            z-index: 10;
        }

        .screen-wrapper {
            padding: 15px;
            background: #1a1a1a;
            border-radius: 12px 12px 0 0;
        }

        .screen {
            background-color: var(--screen-bg);
            height: 280px;
            border: 2px solid #333;
            border-radius: 8px;
            position: relative;
            padding: 20px 0; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 5; pointer-events: none;
        }

        h1 {
            color: var(--capcom-yellow);
            text-align: center;
            font-size: 14px;
            margin: 0 0 20px 0;
            text-shadow: 2px 2px #000;
            flex-shrink: 0;
            letter-spacing: 1px;
        }

        .screen-content {
            width: 100%; overflow-y: auto; scroll-behavior: smooth; flex-grow: 1;
        }
        .screen-content::-webkit-scrollbar { width: 8px; }
        .screen-content::-webkit-scrollbar-track { background: #111; }
        .screen-content::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

        ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; padding-bottom: 80px; }
        li { color: #777; font-size: 11px; padding: 15px 20px 15px 50px; transition: 0.2s; position: relative; text-transform: uppercase; white-space: nowrap; line-height: 1.5; cursor: pointer; }
        li.selected { color: var(--neon-green); background: rgba(0, 255, 0, 0.08); text-shadow: 0 0 8px rgba(0, 255, 0, 0.5); }
        li.selected::before { content: "▶"; position: absolute; left: 20px; color: var(--neon-green); animation: blink 0.4s infinite alternate; }

        @keyframes blink { from { opacity: 0.3; } to { opacity: 1; } }

        .control-panel {
            background: var(--panel-bg); border-top: 2px solid #444;
            padding: 20px 30px; display: flex; justify-content: space-between;
            align-items: center; border-radius: 0 0 12px 12px;
        }

        .joystick-area { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .nav-buttons { display: flex; gap: 10px; }
        .btn-nav { width: 45px; height: 45px; background: #444; border: 2px solid #111; color: white; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 0 #111; font-family: inherit; font-size: 12px; transition: 0.1s; }
        .btn-nav:active { transform: translateY(4px); box-shadow: 0 0 0 #111; }
        .joystick-label { font-size: 8px; color: #aaa; letter-spacing: 1px; }

        .button-area { display: flex; gap: 15px; }
        .btn-action { width: 70px; height: 70px; font-family: inherit; font-size: 10px; cursor: pointer; border: 2px solid #111; border-radius: 10px; transition: 0.1s; text-shadow: 1px 1px 0px rgba(0,0,0,0.5); }
        .btn-info { background: var(--capcom-yellow); color: #000; box-shadow: 0 5px 0 #b38f00; text-shadow: none; }
        .btn-start { background: var(--arcade-red); color: white; box-shadow: 0 5px 0 #99002e; }
        .btn-action:active { transform: translateY(5px); box-shadow: 0 0 0 #111; }

        /* ----- MODAL & POPUPS ----- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); display: flex; justify-content: center; align-items: center; z-index: 200; backdrop-filter: blur(4px); }
        .modal-content { background: #1a1a1a; border: 2px solid var(--retro-blue); padding: 30px; width: 80%; max-width: 350px; text-align: center; border-radius: 12px; box-shadow: 0 0 30px rgba(0, 212, 255, 0.2); animation: modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .hidden { display: none !important; }

        #banner { 
        position: fixed; 
        top: 50%; /* Letak di tengah secara menegak */
        left: 0; 
        width: 100%; /* Memanjang dari kiri ke kanan */
        padding: 30px 0; /* Jarak atas dan bawah supaya tak makan satu skrin */
        transform: translateY(-50%); /* Adjust supaya betul-betul center */
        background: rgba(255, 0, 76, 0.95); 
        color: #fff; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        z-index: 1000; 
        opacity: 0; 
        pointer-events: none; 
        transition: opacity 0.4s ease; 
        font-size: 24px; /* Besarkan sikit font supaya lebih menyerlah */
        text-align: center; 
        border-top: 6px solid #fff; /* Buat border atas dan bawah sahaja */
        border-bottom: 6px solid #fff; 
        box-sizing: border-box; 
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); /* Tambah shadow supaya nampak timbul */
        }
        #banner.show-banner { opacity: 1; pointer-events: all; }
        .banner-text { animation: bannerScale 0.5s infinite alternate; line-height: 1.5; }
        @keyframes bannerScale { from { transform: scale(1); } to { transform: scale(1.05); } }

        /* ----- GAME POPUP KAWASAN MAIN ----- */
        .game-popup {
            position: fixed; inset: 0; z-index: 2000;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .game-popup.active { opacity: 1; pointer-events: all; }
        
        .game-popup-content {
            width: 95%; max-width: 900px; height: 85vh;
            background: #000; border: 3px solid var(--neon-green);
            border-radius: 10px; display: flex; flex-direction: column;
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.3);
            transform: scale(0.8);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }
        .game-popup.active .game-popup-content { transform: scale(1); }

        .game-header {
            background: #111; border-bottom: 2px solid var(--neon-green);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .game-title { color: var(--neon-green); font-size: 14px; text-shadow: 0 0 10px var(--neon-green); }
        .btn-exit {
            background: var(--arcade-red); color: white; border: none; padding: 10px 15px;
            font-family: inherit; font-size: 10px; cursor: pointer; border-radius: 6px; box-shadow: 0 4px 0 #800;
        }
        .btn-exit:active { transform: translateY(4px); box-shadow: 0 0 0 #800; }
        
        iframe { width: 100%; height: 100%; border: none; background: #000; flex-grow: 1; }
    </style>
</head>
<body>

    <div class="grid-floor"></div>

    <div id="banner">
        <div class="banner-text" id="banner-msg">MISSION START!</div>
    </div>

    <div id="info-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 style="color: var(--capcom-yellow); font-size: 14px; margin-bottom: 20px;">CONTROLS</h2>
            <div style="text-align: left; font-size: 10px; line-height: 2.5; margin-bottom: 25px; color: #ccc;">
                <p><span style="color: var(--retro-blue);">[ MOVE ]</span> ARROWS / PANEL</p>
                <p><span style="color: var(--retro-blue);">[ PLAY ]</span> SPACEBAR / ENTER</p>
                <p><span style="color: var(--retro-blue);">[ STOP ]</span> ESC KEY</p>
            </div>
            <button class="btn-action btn-start" onclick="closeInfo()" style="width: 100%; height: 45px; border-radius: 6px;">CLOSE</button>
        </div>
    </div>

    <div id="game-popup" class="game-popup">
        <div class="game-popup-content">
            <div class="game-header">
                <span class="game-title" id="active-game-title">KADET BLAST</span>
                <button class="btn-exit" onclick="closeGamePopup()">[X] EXIT GAME</button>
            </div>
            <iframe id="game-frame" src=""></iframe>
        </div>
    </div>

    <div class="machine-container">
        <div class="screen-wrapper">
            <div class="screen">
                <div class="scanlines"></div>
                <h1>SELECT MISSION</h1>
                <div class="screen-content" id="screen-scroll">
                    <ul id="game-list">
                        <li data-url="kadetblast.html" class="selected">KADET BLAST</li>
                        <li data-url="1941.html">1941 RE-BOOT</li>
                        <li data-url="typing.html">Typing Interstellar</li>
                        <li data-url="combat.html">MECHA COMBAT</li>
                        <li data-url="spaceattack.html">SPACE ATTACK</li>
                        <li data-url="overdrive.html">OVERDRIVE</li>
                        <li data-url="snake.html">SNAKE</li>
                        <li data-url="pacman.html">PAC-MAN RETRO</li>
                        <li data-url="tetris.html">TETRIS BLOCK</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="control-panel">
            <div class="joystick-area">
                <div class="nav-buttons">
                    <button class="btn-nav" id="btn-up">▲</button>
                    <button class="btn-nav" id="btn-down">▼</button>
                </div>
                <span class="joystick-label">NAVIGATE</span>
            </div>
            <div class="button-area">
                <button class="btn-action btn-info" onclick="showInfo()">INFO</button>
                <button class="btn-action btn-start" id="btn-start">START</button>
            </div>
        </div>
    </div>

    <script>
        const gameItems = document.querySelectorAll('#game-list li');
        const scrollContainer = document.getElementById('screen-scroll');
        let currentIndex = 0;

        // Klik direct pada nama game kat list
        gameItems.forEach((item, index) => {
            item.addEventListener('click', () => {
                currentIndex = index;
                updateMenu();
            });
        });

        function playSound(freq, duration = 0.1) {
            try {
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const osc = context.createOscillator();
                const gain = context.createGain();
                osc.type = "square";
                osc.frequency.setValueAtTime(freq, context.currentTime);
                gain.gain.setValueAtTime(0.05, context.currentTime);
                osc.connect(gain);
                gain.connect(context.destination);
                osc.start();
                osc.stop(context.currentTime + duration);
            } catch(e) {}
        }

        function updateMenu() {
            gameItems.forEach((li, i) => li.classList.toggle('selected', i === currentIndex));
            
            const selectedItem = gameItems[currentIndex];
            const containerHeight = scrollContainer.offsetHeight;
            const itemOffset = selectedItem.offsetTop;
            const itemHeight = selectedItem.offsetHeight;
            
            scrollContainer.scrollTo({
                top: itemOffset - (containerHeight / 2) + (itemHeight / 2),
                behavior: 'smooth'
            });

            playSound(150);
        }

        function moveUp() { if(currentIndex > 0) { currentIndex--; updateMenu(); } }
        function moveDown() { if(currentIndex < gameItems.length - 1) { currentIndex++; updateMenu(); } }
        function showInfo() { playSound(300); document.getElementById('info-modal').classList.remove('hidden'); }
        function closeInfo() { playSound(100); document.getElementById('info-modal').classList.add('hidden'); }

        // --- FUNGSI BARU UNTUK BUKA GAME POPUP ---
        function startMission() {
            const selectedItem = gameItems[currentIndex];
            const url = selectedItem.getAttribute('data-url');
            const title = selectedItem.textContent;
            
            if(!url) return;

            playSound(400, 0.4); // Bunyi start
            
            const banner = document.getElementById('banner');
            const msg = document.getElementById('banner-msg');
            
            msg.textContent = title + " START!";
            banner.classList.add('show-banner');

            // Lepas 1.5 saat tunjuk banner merah, kita buang banner dan buka popup
            setTimeout(() => {
                banner.classList.remove('show-banner');
                openGamePopup(url, title);
            }, 1500); 
        }

        function openGamePopup(url, title) {
            document.getElementById('active-game-title').textContent = title;
            document.getElementById('game-frame').src = url; // Load file HTML game masuk iframe
            document.getElementById('game-popup').classList.add('active'); // Pop out animasi
        }

        function closeGamePopup() {
            playSound(100, 0.2);
            document.getElementById('game-popup').classList.remove('active');
            
            // Kosongkan src iframe lepas animasi popup tertutup supaya game berhenti jalan di latar belakang
            setTimeout(() => {
                document.getElementById('game-frame').src = ""; 
            }, 400);
        }

        // Event Listeners
        document.getElementById('btn-up').addEventListener('click', moveUp);
        document.getElementById('btn-down').addEventListener('click', moveDown);
        document.getElementById('btn-start').addEventListener('click', startMission);

        window.addEventListener('keydown', (e) => {
            // Halang scroll guna arrow key bila dalam menu
            if(document.getElementById('game-popup').classList.contains('active')) return; 

            if(e.key === "ArrowUp") moveUp();
            if(e.key === "ArrowDown") moveDown();
            if(e.key === "Enter") startMission();
            if(e.key === "Escape") {
                closeInfo();
            }
        });

        // Initialize scroll position
        updateMenu();
    </script>
</body>
</html>
