<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNOOKER PIXEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Press Start 2P', cursive;
            image-rendering: pixelated;
        }

        #game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 8px solid #333;
            background: #000;
        }

        canvas {
            display: block;
            background-color: #0e3d0e;
            cursor: crosshair;
        }

        .ui-panel {
            position: absolute;
            top: -120px;
            background: #111;
            padding: 20px;
            border: 4px solid #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 1000px;
            z-index: 10;
        }

        #menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        .menu-card {
            background: #222;
            padding: 30px;
            border: 8px solid #fff;
            width: 850px;
            max-height: 90vh;
            overflow-y: auto;
            text-align: center;
            box-shadow: 20px 20px 0px #000;
            animation: float 3s ease-in-out infinite;
        }

        .power-bar {
            position: absolute;
            left: -40px;
            height: 400px;
            width: 20px;
            background: #333;
            border: 4px solid #fff;
            bottom: 50px;
        }

        #power-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, #0f0, #ff0, #f00);
        }

        .pixel-btn {
            background: #444;
            border: 4px solid #fff;
            padding: 12px;
            font-size: 10px;
            color: #fff;
            margin: 5px;
            cursor: pointer;
            transition: all 0.1s;
            font-family: 'Press Start 2P', cursive;
        }
        .pixel-btn:hover { background: #666; transform: scale(1.05); }
        .pixel-btn:active { transform: translateY(4px); background: #222; }
        .pixel-btn.active { background: #2563eb; border-color: #00f; }
        .pixel-btn.primary { background: #080; border-color: #0f0; }
        .pixel-btn.danger { background: #800; border-color: #f00; }
        .pixel-btn.warning { background: #b45309; border-color: #fbbf24; }

        .pixel-input {
            background: #111;
            border: 4px solid #fff;
            color: #fff;
            padding: 10px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            width: 100%;
            text-align: center;
            outline: none;
        }
        .pixel-input:focus { border-color: #fbbf24; }

        .skin-option {
            cursor: pointer;
            border: 4px solid #444;
            background: #111;
            padding: 10px;
            flex: 1;
            min-width: 100px;
        }
        .skin-option.active { border-color: #0f0; background: #030; }

        #warning-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            font-size: 20px;
            display: none;
            color: #f00;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border: 4px solid #f00;
            text-shadow: 2px 2px #000;
            text-align: center;
        }

        .text-pixel { font-size: 10px; line-height: 1.5; }
        .title-pixel { font-size: 32px; color: #fbbf24; margin-bottom: 20px; text-shadow: 4px 4px #000; }
        
        #pause-btn {
            position: absolute;
            bottom: -60px;
            right: 0;
            background: #333;
            border: 4px solid #fff;
            color: #fff;
            padding: 10px;
            font-size: 10px;
            cursor: pointer;
        }

        .menu-card::-webkit-scrollbar { width: 10px; }
        .menu-card::-webkit-scrollbar-track { background: #111; }
        .menu-card::-webkit-scrollbar-thumb { background: #fff; border: 2px solid #111; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="warning-popup">FOUL!</div>
    <button id="pause-btn" onclick="toggleMenu()">PAUSE (ESC)</button>

    <div class="ui-panel">
        <div>
            <div id="p1-label-ui" class="text-pixel text-blue-400 mb-2">PLAYER 1</div>
            <div id="player-score" class="text-2xl">0</div>
        </div>
        <div class="text-center">
            <div id="turn-indicator" class="text-pixel bg-blue-700 px-2 py-1 mb-2">YOUR TURN</div>
            <div id="target-info" class="text-pixel">TARGET: <span id="target-color-text" class="text-red-500">RED</span></div>
            <div id="break-info" class="text-pixel mt-2 text-gray-400">BREAK: 0</div>
        </div>
        <div class="text-right">
            <div id="p2-label-ui" class="text-pixel text-red-500 mb-2">AI</div>
            <div id="ai-score" class="text-2xl">0</div>
        </div>
    </div>

    <div id="menu-overlay">
        <div class="menu-card" id="menu-content-container">
            <h1 class="title-pixel">SNOOKER PIXEL</h1>
            
            <div id="menu-view-main">
                <div class="mb-6">
                    <p class="text-pixel text-gray-400 mb-4">GAME MODE:</p>
                    <div class="flex justify-center gap-2">
                        <button onclick="setGameMode('vs-ai')" id="mode-ai" class="pixel-btn active">VS AI</button>
                        <button onclick="setGameMode('vs-player')" id="mode-player" class="pixel-btn">VS P2</button>
                    </div>
                </div>

                <div class="mb-6 grid grid-cols-2 gap-4">
                    <div>
                        <p class="text-pixel text-gray-400 mb-2">P1 NAME:</p>
                        <input type="text" id="input-p1-name" class="pixel-input" maxlength="10" value="PLAYER 1">
                    </div>
                    <div>
                        <p id="p2-input-label" class="text-pixel text-gray-400 mb-2">AI NAME:</p>
                        <input type="text" id="input-p2-name" class="pixel-input" maxlength="10" value="AI">
                    </div>
                </div>

                <div id="ai-difficulty-container" class="mb-6">
                    <p class="text-pixel text-gray-400 mb-4">AI DIFFICULTY:</p>
                    <div class="flex justify-center gap-2">
                        <button onclick="setDifficulty('easy')" id="diff-easy" class="pixel-btn">EASY</button>
                        <button onclick="setDifficulty('normal')" id="diff-normal" class="pixel-btn active">NORMAL</button>
                        <button onclick="setDifficulty('pro')" id="diff-pro" class="pixel-btn">PRO</button>
                    </div>
                </div>

                <div class="mb-6">
                    <p class="text-pixel text-gray-400 mb-4">CHOOSE CUE SKIN:</p>
                    <div class="flex flex-wrap justify-center gap-2">
                        <div onclick="setSkin('classic')" id="skin-classic" class="skin-option active">
                            <div class="w-full h-3 bg-amber-800 mb-1"></div>
                            <span class="text-pixel">CLASSIC</span>
                        </div>
                        <div onclick="setSkin('carbon')" id="skin-carbon" class="skin-option">
                            <div class="w-full h-3 bg-gray-800 mb-1"></div>
                            <span class="text-pixel">CARBON</span>
                        </div>
                        <div onclick="setSkin('neon')" id="skin-neon" class="skin-option">
                            <div class="w-full h-3 bg-cyan-500 mb-1"></div>
                            <span class="text-pixel">NEON</span>
                        </div>
                        <div onclick="setSkin('gold')" id="skin-gold" class="skin-option">
                            <div class="w-full h-3 bg-yellow-500 mb-1"></div>
                            <span class="text-pixel">GOLD</span>
                        </div>
                        <div onclick="setSkin('amethyst')" id="skin-amethyst" class="skin-option">
                            <div class="w-full h-3 bg-purple-600 mb-1"></div>
                            <span class="text-pixel">AMETHYST</span>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-3 mt-6">
                    <button id="btn-resume" onclick="toggleMenu()" class="pixel-btn primary" style="display:none;">RESUME</button>
                    <button id="btn-start" onclick="startGame()" class="pixel-btn primary">START GAME</button>
                    <button id="btn-restart" onclick="restartGame()" class="pixel-btn warning" style="display:none;">RESTART</button>
                    <button id="btn-home" onclick="goHome()" class="pixel-btn danger" style="display:none;">HOME</button>
                </div>
            </div>
        </div>
    </div>

    <div class="power-bar">
        <div id="power-fill"></div>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    // --- AUDIO SYSTEM ---
    const AudioEngine = {
        ctx: new (window.AudioContext || window.webkitAudioContext)(),
        
        playHit(volume = 1) {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(volume * 0.2, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + 0.1);
        },

        speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 1.1;
            window.speechSynthesis.speak(msg);
        }
    };

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const TABLE_W = 1000, TABLE_H = 500, PADDING = 80;
    const BALL_R = 12, FRICTION = 0.988, WALL_BOUNCE = 0.7;
    const POCKET_R = 28;

    const COLORS = { 
        white: '#ffffff', red: '#ff0000', yellow: '#ffff00', green: '#00ff00', 
        brown: '#8b4513', blue: '#0000ff', pink: '#ff00ff', black: '#111111' 
    };

    const SPOTS = { 
        brown: {x:250, y:250}, 
        yellow: {x:250, y:330}, 
        green: {x:250, y:170}, 
        blue: {x:500, y:250}, 
        pink: {x:730, y:250}, 
        black: {x:920, y:250} 
    };

    const COLOR_ORDER = ['yellow', 'green', 'brown', 'blue', 'pink', 'black'];

    const SKINS = {
        classic: { start: '#e0c0a0', mid: '#8b4513', end: '#3d1f0a' },
        carbon: { start: '#555555', mid: '#222222', end: '#000000' },
        neon: { start: '#ffffff', mid: '#00f2ff', end: '#004444' },
        gold: { start: '#fef3c7', mid: '#d97706', end: '#92400e' },
        amethyst: { start: '#f5f3ff', mid: '#7c3aed', end: '#4c1d95' }
    };

    let balls = [], cueBall = null;
    let turn = 'player', scores = {player:0, ai:0}, currentBreak = 0;
    let playerNames = {player: "PLAYER 1", ai: "AI"};
    let nextTarget = 'red'; 
    let targetColorIndex = 0;
    let isMoving = false, isCharging = false, power = 0, cueAngle = 0;
    let isPlacingCueBall = true, isPaused = true, hasGameStarted = false;
    let firstBallHit = null; 
    let ballsPottedThisShot = [];
    let currentSkin = 'classic';
    let difficulty = 'normal';
    let gameMode = 'vs-ai'; 
    let gameEnded = false;

    class Ball {
        constructor(x, y, color, type, value, spotId = null) {
            this.x = x; this.y = y; this.color = color; this.type = type; this.value = value;
            this.vx = 0; this.vy = 0; this.inPocket = false; this.spotId = spotId;
        }
        draw() {
            if (this.inPocket) return;
            const px = this.x + PADDING, py = this.y + PADDING;
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.fillRect(px + 3 - BALL_R, py + 3 - BALL_R, BALL_R * 2, BALL_R * 2);
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(px, py, BALL_R, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.fillRect(px - 4, py - 6, 4, 4);
        }
        update() {
            if (this.inPocket || isPaused) return;
            this.x += this.vx; this.y += this.vy;
            this.vx *= FRICTION; this.vy *= FRICTION;
            if (Math.abs(this.vx) < 0.15) this.vx = 0;
            if (Math.abs(this.vy) < 0.15) this.vy = 0;
            
            if (this.x < BALL_R || this.x > TABLE_W - BALL_R) { 
                if(Math.abs(this.vx) > 0.5) AudioEngine.playHit(0.5);
                this.vx *= -WALL_BOUNCE; this.x = this.x < BALL_R ? BALL_R : TABLE_W - BALL_R; 
            }
            if (this.y < BALL_R || this.y > TABLE_H - BALL_R) { 
                if(Math.abs(this.vy) > 0.5) AudioEngine.playHit(0.5);
                this.vy *= -WALL_BOUNCE; this.y = this.y < BALL_R ? BALL_R : TABLE_H - BALL_R; 
            }
            this.checkPocket();
        }
        checkPocket() {
            const pockets = [{x:0, y:0}, {x:500, y:0}, {x:1000, y:0}, {x:0, y:500}, {x:500, y:500}, {x:1000, y:500}];
            for (let p of pockets) {
                if (Math.hypot(this.x - p.x, this.y - p.y) < POCKET_R) {
                    this.inPocket = true; this.vx = 0; this.vy = 0;
                    ballsPottedThisShot.push(this);
                }
            }
        }
    }

    function initGame() {
        canvas.width = TABLE_W + PADDING*2;
        canvas.height = TABLE_H + PADDING*2;
        balls = [];
        scores = {player:0, ai:0};
        currentBreak = 0;
        turn = 'player';
        nextTarget = 'red';
        targetColorIndex = 0;
        gameEnded = false;

        playerNames.player = document.getElementById('input-p1-name').value.toUpperCase() || "PLAYER 1";
        playerNames.ai = document.getElementById('input-p2-name').value.toUpperCase() || (gameMode === 'vs-ai' ? "AI" : "PLAYER 2");
        
        cueBall = new Ball(200, 250, COLORS.white, 'cue', 0);
        balls.push(cueBall);
        
        const startX = 770;
        const spacing = BALL_R * 2.1;
        for (let i = 0; i < 5; i++) {
            for (let j = 0; j <= i; j++) {
                balls.push(new Ball(startX + i * spacing, 250 - (i * BALL_R) + (j * spacing), COLORS.red, 'red', 1));
            }
        }
        
        Object.entries(SPOTS).forEach(([id, p]) => {
            const val = {yellow:2, green:3, brown:4, blue:5, pink:6, black:7}[id];
            balls.push(new Ball(p.x, p.y, COLORS[id], 'color', val, id));
        });
        
        updateUI();
    }

    function startGame() {
        if (AudioEngine.ctx.state === 'suspended') AudioEngine.ctx.resume();
        hasGameStarted = true;
        document.getElementById('btn-start').style.display = 'none';
        document.getElementById('btn-resume').style.display = 'block';
        document.getElementById('btn-restart').style.display = 'block';
        document.getElementById('btn-home').style.display = 'block';
        initGame();
        toggleMenu();
        AudioEngine.speak("Game started.");
    }

    function restartGame() {
        initGame();
        hasGameStarted = true;
        gameEnded = false;
        isPaused = false;
        document.getElementById('menu-overlay').style.display = 'none';
        updateUI();
        AudioEngine.speak("Restarting game.");
    }

    function goHome() {
        location.reload();
    }

    function toggleMenu() {
        if (!hasGameStarted && !gameEnded) return;
        isPaused = !isPaused;
        document.getElementById('menu-overlay').style.display = isPaused ? 'flex' : 'none';
    }

    function drawTable() {
        ctx.save(); ctx.translate(PADDING, PADDING);
        ctx.fillStyle = '#3a1a0a';
        ctx.fillRect(-60, -60, TABLE_W+120, TABLE_H+120);
        ctx.strokeStyle = '#000'; ctx.lineWidth = 8;
        ctx.strokeRect(-60, -60, TABLE_W+120, TABLE_H+120);
        ctx.fillStyle = '#0e3d0e';
        ctx.fillRect(0, 0, TABLE_W, TABLE_H);
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.beginPath(); ctx.moveTo(250, 0); ctx.lineTo(250, TABLE_H); ctx.stroke();
        ctx.beginPath(); ctx.arc(250, 250, 80, Math.PI/2, Math.PI*1.5); ctx.stroke();
        [{x:0, y:0}, {x:500, y:0}, {x:1000, y:0}, {x:0, y:500}, {x:500, y:500}, {x:1000, y:500}].forEach(p => {
            ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.arc(p.x, p.y, POCKET_R, 0, Math.PI*2); ctx.fill();
        });
        ctx.restore();
    }

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawTable();
        let movingNow = false;
        balls.forEach(b => {
            b.update(); b.draw();
            if (Math.abs(b.vx) > 0 || Math.abs(b.vy) > 0) movingNow = true;
        });
        if (movingNow) { checkCollisions(); isMoving = true; } 
        else if (isMoving) { isMoving = false; handlePostShot(); }
        drawCueAndGuide();
        requestAnimationFrame(gameLoop);
    }

    function checkCollisions() {
        for (let i = 0; i < balls.length; i++) {
            for (let j = i + 1; j < balls.length; j++) {
                const b1 = balls[i], b2 = balls[j];
                if (b1.inPocket || b2.inPocket) continue;
                const dx = b2.x - b1.x, dy = b2.y - b1.y, dist = Math.hypot(dx, dy);
                if (dist < BALL_R * 2) {
                    const totalSpeed = Math.hypot(b1.vx, b1.vy) + Math.hypot(b2.vx, b2.vy);
                    if(totalSpeed > 0.5) AudioEngine.playHit(Math.min(1, totalSpeed / 10));

                    if (b1 === cueBall && firstBallHit === null) firstBallHit = b2;
                    if (b2 === cueBall && firstBallHit === null) firstBallHit = b1;
                    const angle = Math.atan2(dy, dx), overlap = BALL_R * 2 - dist;
                    b1.x -= (overlap/2) * Math.cos(angle); b1.y -= (overlap/2) * Math.sin(angle);
                    b2.x += (overlap/2) * Math.cos(angle); b2.y += (overlap/2) * Math.sin(angle);
                    const nx = dx/dist, ny = dy/dist, tx = -ny, ty = nx;
                    const dpTan1 = b1.vx*tx + b1.vy*ty, dpTan2 = b2.vx*tx + b2.vy*ty;
                    const dpNorm1 = b1.vx*nx + b1.vy*ny, dpNorm2 = b2.vx*nx + b2.vy*ny;
                    b1.vx = tx*dpTan1 + nx*dpNorm2; b1.vy = ty*dpTan1 + ny*dpNorm2;
                    b2.vx = tx*dpTan2 + nx*dpNorm1; b2.vy = ty*dpTan2 + ny*dpNorm1;
                }
            }
        }
    }

    function handlePostShot() {
        if (isPaused || gameEnded) return;
        let foul = false, foulReason = "", foulValue = 4, points = 0, scored = false;
        const currentOpponent = (turn === 'player') ? 'ai' : 'player';
        const redsRemaining = balls.some(r => r.type === 'red' && !r.inPocket);

        if (!firstBallHit) {
            foul = true; foulReason = "MISS! NO BALL HIT";
        } else {
            let expectedType = nextTarget === 'red' ? 'red' : 'color';
            if (!redsRemaining && typeof nextTarget === 'string' && nextTarget !== 'red' && nextTarget !== 'color') {
                 if (firstBallHit.spotId !== nextTarget) {
                     foul = true; foulReason = `FOUL! MUST HIT ${nextTarget.toUpperCase()}`;
                     foulValue = Math.max(4, firstBallHit.value);
                 }
            } else if (firstBallHit.type !== expectedType) {
                foul = true; foulReason = `FOUL! MUST HIT ${expectedType === 'red' ? 'RED' : 'COLOR'}`;
                foulValue = Math.max(4, firstBallHit.value);
            }
        }

        if (ballsPottedThisShot.length > 0) {
            if (ballsPottedThisShot.find(b => b.type === 'cue')) {
                foul = true; foulReason = "SCRATCH! CUE BALL POTTED";
                foulValue = Math.max(foulValue, 4);
                resetBall(cueBall, true);
            }
            ballsPottedThisShot.forEach(b => {
                if (!foul) {
                    if (nextTarget === 'red' && b.type !== 'red') { foul = true; foulReason = "FOUL! COLOR POTTED"; }
                    else if (nextTarget === 'color' && b.type !== 'color') { foul = true; foulReason = "FOUL! RED POTTED"; }
                    else if (!redsRemaining && b.spotId !== nextTarget) { foul = true; foulReason = `FOUL! ${b.spotId.toUpperCase()} POTTED`; }
                    if (foul) foulValue = Math.max(foulValue, b.value);
                } else {
                    foulValue = Math.max(foulValue, b.value);
                }
            });
            if (!foul) {
                ballsPottedThisShot.forEach(b => {
                    points += b.value;
                    if (b.type === 'color' && redsRemaining) resetBall(b);
                });
                scored = true;
            }
        }

        if (foul) { 
            scores[currentOpponent] += foulValue;
            showFoul(`${foulReason} (+${foulValue})`);
            AudioEngine.speak("Foul. Points awarded to opponent.");
            if (redsRemaining) nextTarget = 'red'; else nextTarget = COLOR_ORDER[targetColorIndex];
            ballsPottedThisShot.forEach(b => { if (b.type === 'color') resetBall(b); });
            switchTurn(); 
        } else if (scored) { 
            scores[turn] += points; currentBreak += points;
            AudioEngine.speak(`${points} points scored.`);

            if (redsRemaining) {
                nextTarget = (nextTarget === 'red') ? 'color' : 'red';
            } else {
                if (nextTarget === 'color' || nextTarget === 'red') {
                    nextTarget = COLOR_ORDER[targetColorIndex];
                } else {
                    targetColorIndex++;
                    if (targetColorIndex >= COLOR_ORDER.length) { endGame(); return; }
                    nextTarget = COLOR_ORDER[targetColorIndex];
                }
            }
        } else { 
            switchTurn(); 
            if (redsRemaining) nextTarget = 'red'; else nextTarget = COLOR_ORDER[targetColorIndex];
        }

        ballsPottedThisShot = []; firstBallHit = null; updateUI();
        if (gameMode === 'vs-ai' && turn === 'ai' && !gameEnded) setTimeout(aiAction, 1000);
    }

    function endGame() {
        gameEnded = true;
        isPaused = true;
        const winnerName = scores.player > scores.ai ? playerNames.player : playerNames.ai;
        const winner = `${winnerName} WINS!`;
        AudioEngine.speak(`Game over. ${winnerName} wins with ${Math.max(scores.player, scores.ai)} points.`);
        document.getElementById('menu-content-container').innerHTML = `
            <h1 class="title-pixel">GAME OVER!</h1>
            <p class="text-pixel text-blue-500 mb-8">${winner}</p>
            <div class="mb-4 text-pixel">
                ${playerNames.player}: ${scores.player}<br>
                ${playerNames.ai}: ${scores.ai}
            </div>
            <button onclick="restartGame()" class="pixel-btn primary">PLAY AGAIN</button>
            <button onclick="goHome()" class="pixel-btn danger">HOME</button>
        `;
        document.getElementById('menu-overlay').style.display = 'flex';
    }

    function resetBall(b, cue = false) {
        b.inPocket = false; b.vx = 0; b.vy = 0;
        if (cue) { b.x = 200; b.y = 250; isPlacingCueBall = true; }
        else if (b.spotId) { b.x = SPOTS[b.spotId].x; b.y = SPOTS[b.spotId].y; }
    }

    function switchTurn() { 
        turn = (turn === 'player') ? 'ai' : 'player'; 
        currentBreak = 0; 
        updateUI(); 
        const nextPlayer = (turn === 'player') ? playerNames.player : playerNames.ai;
        AudioEngine.speak(`${nextPlayer}'s turn.`);
    }

    function drawCueAndGuide() {
        if (isMoving || isPlacingCueBall || isPaused || gameEnded) return;
        if (gameMode === 'vs-ai' && turn === 'ai') return;
        
        const px = cueBall.x + PADDING, py = cueBall.y + PADDING;
        let rayVx = Math.cos(cueAngle), rayVy = Math.sin(cueAngle);
        
        const redsRemaining = balls.some(r => r.type === 'red' && !r.inPocket);

        let hit = null;
        for (let b of balls) {
            if (b === cueBall || b.inPocket) continue;
            let dx = b.x - cueBall.x, dy = b.y - cueBall.y;
            let dot = dx * rayVx + dy * rayVy;
            if (dot <= 0) continue;
            let perpDistSq = (dx*dx + dy*dy) - dot*dot;
            if (perpDistSq < (BALL_R*2)*(BALL_R*2)) {
                let d = dot - Math.sqrt((BALL_R*2)*(BALL_R*2) - perpDistSq);
                if (d > 0 && (!hit || d < hit.dist)) hit = {dist: d, ball: b};
            }
        }

        let tx = rayVx > 0 ? (TABLE_W - BALL_R - cueBall.x) / rayVx : (BALL_R - cueBall.x) / rayVx;
        let ty = rayVy > 0 ? (TABLE_H - BALL_R - cueBall.y) / rayVy : (BALL_R - cueBall.y) / rayVy;
        let wallD = Math.min(tx, ty);

        let guideColor = 'rgba(255,255,255,0.3)';
        let impactX, impactY;

        if (hit && hit.dist < wallD) {
            impactX = cueBall.x + rayVx * hit.dist;
            impactY = cueBall.y + rayVy * hit.dist;
            
            let b = hit.ball;
            let expectedType = nextTarget === 'red' ? 'red' : 'color';
            let isFoulTarget = false;
            if (!redsRemaining && typeof nextTarget === 'string' && nextTarget !== 'red' && nextTarget !== 'color') {
                if (b.spotId !== nextTarget) isFoulTarget = true;
            } else if (b.type !== expectedType) {
                isFoulTarget = true;
            }
            if (isFoulTarget) guideColor = 'rgba(255, 0, 0, 0.5)';

            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = guideColor;
            ctx.beginPath();
            ctx.moveTo(px, py);
            ctx.lineTo(impactX + PADDING, impactY + PADDING);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(impactX + PADDING, impactY + PADDING, BALL_R, 0, Math.PI * 2);
            ctx.stroke();

            let objDx = hit.ball.x - impactX;
            let objDy = hit.ball.y - impactY;
            let objDist = Math.hypot(objDx, objDy);
            let objVx = objDx / objDist;
            let objVy = objDy / objDist;

            ctx.setLineDash([]);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.beginPath();
            ctx.moveTo(hit.ball.x + PADDING, hit.ball.y + PADDING);
            ctx.lineTo(hit.ball.x + PADDING + objVx * 100, hit.ball.y + PADDING + objVy * 100);
            ctx.stroke();

            let tanVx = -objVy;
            let tanVy = objVx;
            if (tanVx * rayVx + tanVy * rayVy < 0) { tanVx *= -1; tanVy *= -1; }

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.beginPath();
            ctx.moveTo(impactX + PADDING, impactY + PADDING);
            ctx.lineTo(impactX + PADDING + tanVx * 80, impactY + PADDING + tanVy * 80);
            ctx.stroke();

        } else {
            impactX = cueBall.x + rayVx * Math.min(wallD, 400);
            impactY = cueBall.y + rayVy * Math.min(wallD, 400);

            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = guideColor;
            ctx.beginPath();
            ctx.moveTo(px, py);
            ctx.lineTo(impactX + PADDING, impactY + PADDING);
            ctx.stroke();

            if (wallD < 400) {
                let reflectVx = rayVx, reflectVy = rayVy;
                if (wallD === tx) reflectVx *= -1; else reflectVy *= -1;
                
                ctx.beginPath();
                ctx.moveTo(impactX + PADDING, impactY + PADDING);
                ctx.lineTo(impactX + PADDING + reflectVx * 100, impactY + PADDING + reflectVy * 100);
                ctx.stroke();
            }
        }
        
        ctx.setLineDash([]);

        ctx.save(); 
        ctx.translate(px, py); 
        ctx.rotate(cueAngle + Math.PI);
        const skin = SKINS[currentSkin];
        const pb = power * 0.8;
        ctx.fillStyle = skin.end; ctx.fillRect(pb + 24, -6, 380, 12);
        ctx.fillStyle = skin.mid; ctx.fillRect(pb + 24, -4, 180, 8);
        ctx.fillStyle = skin.start; ctx.fillRect(pb + 24, -2, 30, 4);
        ctx.restore();
    }

    function aiAction() {
        if (isPaused || turn !== 'ai' || isMoving || gameEnded) return;
        const targets = balls.filter(b => {
            if (b.inPocket || b.type === 'cue') return false;
            if (nextTarget === 'red') return b.type === 'red';
            if (nextTarget === 'color') return b.type === 'color';
            return b.spotId === nextTarget;
        });
        if (targets.length === 0) { switchTurn(); return; }
        let target = targets[Math.floor(Math.random() * targets.length)];
        let err = difficulty === 'easy' ? 0.15 : (difficulty === 'normal' ? 0.06 : 0.01);
        let angle = Math.atan2(target.y - cueBall.y, target.x - cueBall.x) + (Math.random()-0.5)*err;
        executeShot(angle, 7 + Math.random()*12);
    }

    function executeShot(a, f) { 
        if(f > 5) AudioEngine.playHit(0.3);
        cueBall.vx = Math.cos(a) * f; 
        cueBall.vy = Math.sin(a) * f; 
        isMoving = true; 
    }

    function setGameMode(m) {
        gameMode = m;
        document.querySelectorAll('[id^="mode-"]').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`mode-${m === 'vs-ai' ? 'ai' : 'player'}`).classList.add('active');
        
        const aiContainer = document.getElementById('ai-difficulty-container');
        const p2Label = document.getElementById('p2-input-label');
        const p2Input = document.getElementById('input-p2-name');

        if (m === 'vs-player') {
            aiContainer.style.display = 'none';
            p2Label.innerText = "P2 NAME:";
            if(p2Input.value === "AI") p2Input.value = "PLAYER 2";
        } else {
            aiContainer.style.display = 'block';
            p2Label.innerText = "AI NAME:";
            if(p2Input.value === "PLAYER 2") p2Input.value = "AI";
        }
    }

    function setDifficulty(d) {
        difficulty = d;
        document.querySelectorAll('[id^="diff-"]').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`diff-${d}`).classList.add('active');
    }

    function setSkin(s) {
        currentSkin = s;
        document.querySelectorAll('.skin-option').forEach(opt => opt.classList.remove('active'));
        document.getElementById(`skin-${s}`).classList.add('active');
    }

    function showFoul(msg) { 
        const p = document.getElementById('warning-popup'); p.innerText = msg; p.style.display = 'block'; 
        setTimeout(() => p.style.display = 'none', 2500); 
    }

    function updateUI() {
        document.getElementById('p1-label-ui').innerText = playerNames.player;
        document.getElementById('p2-label-ui').innerText = playerNames.ai;
        document.getElementById('player-score').innerText = scores.player;
        document.getElementById('ai-score').innerText = scores.ai;
        document.getElementById('break-info').innerText = `BREAK: ${currentBreak}`;
        
        const ind = document.getElementById('turn-indicator');
        if (turn === 'player') {
            ind.innerText = `${playerNames.player}'S TURN`;
            ind.className = 'text-pixel bg-blue-700 px-2 py-1 mb-2';
        } else {
            ind.innerText = `${playerNames.ai}'S TURN`;
            ind.className = 'text-pixel bg-red-700 px-2 py-1 mb-2';
        }
        
        const targetText = document.getElementById('target-color-text');
        const colorName = nextTarget.toUpperCase();
        targetText.innerText = colorName;
        if (nextTarget === 'red') {
            targetText.style.color = '#ff0000';
            targetText.style.textShadow = 'none';
        } else {
            const shadowColor = COLORS[nextTarget] || '#fff';
            targetText.style.color = shadowColor;
            targetText.style.textShadow = `0 0 10px ${shadowColor}`;
        }
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') toggleMenu();
    });

    canvas.onmousemove = (e) => {
        if (isPaused || gameEnded) return;
        if (gameMode === 'vs-ai' && turn === 'ai' && !isPlacingCueBall) return;
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (canvas.width / rect.width) - PADDING;
        const my = (e.clientY - rect.top) * (canvas.height / rect.height) - PADDING;
        if (isPlacingCueBall) { 
            cueBall.x = Math.max(BALL_R, Math.min(240, mx)); 
            cueBall.y = Math.max(BALL_R, Math.min(TABLE_H-BALL_R, my)); 
        } 
        else { cueAngle = Math.atan2(my - cueBall.y, mx - cueBall.x); }
    };

    canvas.onmousedown = () => { 
        if (isPaused || gameEnded) return;
        if (gameMode === 'vs-ai' && turn === 'ai' && !isPlacingCueBall) return;
        if (!isMoving && !isPlacingCueBall) isCharging = true; 
        if (isPlacingCueBall) isPlacingCueBall = false; 
    };
    
    window.onmouseup = () => { 
        if (isCharging) { 
            isCharging = false; 
            const shotStrength = 3 + (power / 5); 
            executeShot(cueAngle, shotStrength); 
            power = 0; 
            document.getElementById('power-fill').style.height = '0%'; 
        } 
    };
    
    setInterval(() => { 
        if (isCharging) { 
            power = (power + 1.5);
            if (power > 100) power = 0; 
            document.getElementById('power-fill').style.height = power + '%'; 
        } 
    }, 20);

    initGame();
    requestAnimationFrame(gameLoop);
</script>
</body>
</html>
