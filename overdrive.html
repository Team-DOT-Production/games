<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Overdrive - Apex Edition (Manual Trans)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;700;900&display=swap');
        
        body {
            margin: 0; padding: 0; background-color: #050505; color: white;
            font-family: 'Inter', sans-serif; overflow: hidden; touch-action: none;
            user-select: none; -webkit-user-select: none;
        }

        #game-container {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .hud-glass {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }

        .nitro-bar {
            width: 100%; height: 6px; background: rgba(255,255,255,0.1);
            border-radius: 3px; overflow: hidden;
        }

        #nitro-fill {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #00f2ff, #0066ff);
            box-shadow: 0 0 10px #00f2ff;
        }

        /* Tachometer Styling */
        .tacho-container {
            width: 200px; height: 10px; background: rgba(255,255,255,0.1);
            border-radius: 5px; position: relative; overflow: hidden;
        }
        #rpm-fill {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #22c55e 0%, #eab308 70%, #ef4444 90%);
            transition: width 0.05s linear;
        }
        .redline-blink { animation: blink 0.1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } }

        .touch-zone {
            position: absolute; bottom: 30px; z-index: 40;
            display: flex; justify-content: space-between; width: 100%; padding: 0 20px;
            pointer-events: none;
        }
        .control-btn {
            pointer-events: auto; width: 65px; height: 65px;
            border-radius: 50%; background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2);
            display: flex; flex-direction: column; items-center; justify-content: center;
            transition: transform 0.1s; text-align: center;
        }
        .control-btn:active { background: rgba(255,255,255,0.3); transform: scale(0.9); }
        .gear-btn { background: rgba(234, 179, 8, 0.2); border-color: #eab308; }
        .nitro-btn { background: rgba(0, 242, 255, 0.2); border-color: #00f2ff; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <!-- TOP HUD -->
    <div class="absolute top-4 left-4 right-4 flex justify-between items-start z-20 pointer-events-none">
        <div class="hud-glass p-4 min-w-[140px]">
            <div class="text-[9px] uppercase tracking-widest text-red-500 font-black mb-1">Score</div>
            <div id="score" class="text-3xl font-black font-['Orbitron']">000000</div>
            <div class="mt-3">
                <div class="flex justify-between text-[8px] font-black uppercase text-cyan-400 mb-1">
                    <span>Nitro</span>
                    <span id="nitro-percent">60%</span>
                </div>
                <div class="nitro-bar"><div id="nitro-fill"></div></div>
            </div>
        </div>
        
        <div class="hud-glass p-4 text-center min-w-[120px]">
            <div id="gear-display" class="text-5xl font-black text-white font-['Orbitron']">N</div>
            <div class="text-[10px] text-yellow-500 font-bold uppercase tracking-tighter">Gear</div>
        </div>

        <div class="hud-glass p-4 text-right">
            <div id="speedo" class="text-4xl font-black italic font-['Orbitron'] text-white">0</div>
            <div class="text-[10px] text-gray-400 font-bold uppercase">km/h</div>
            <div class="mt-3">
                <div class="tacho-container"><div id="rpm-fill"></div></div>
            </div>
        </div>
    </div>

    <!-- TOUCH CONTROLS -->
    <div id="touch-controls" class="touch-zone hidden">
        <div class="flex gap-3">
            <div id="btn-left" class="control-btn"><span class="font-black">L</span></div>
            <div id="btn-right" class="control-btn"><span class="font-black">R</span></div>
        </div>
        <div class="flex gap-3">
            <div id="btn-down" class="control-btn gear-btn"><span class="text-[10px] font-black">SHIFT</span><span class="text-xl font-bold">−</span></div>
            <div id="btn-up" class="control-btn gear-btn"><span class="text-[10px] font-black">SHIFT</span><span class="text-xl font-bold">+</span></div>
            <div id="btn-nitro" class="control-btn nitro-btn"><span class="text-[10px] font-black">NITRO</span></div>
        </div>
    </div>

    <!-- START MENU -->
    <div id="start-menu" class="absolute inset-0 flex flex-col items-center justify-center z-50 bg-black/70 backdrop-blur-md px-6 text-center">
        <h1 class="text-7xl font-black italic tracking-tighter text-white mb-2">OVERDRIVE</h1>
        <p class="text-red-500 tracking-[0.3em] font-bold uppercase text-xs mb-10">Manual Transmission / Louder Stututu</p>
        <button class="bg-red-600 hover:bg-red-500 px-12 py-4 rounded-full font-black uppercase tracking-widest text-lg transition-all" onclick="initAndStart()">Ignition</button>
        <div class="mt-8 text-gray-400 text-[10px] uppercase tracking-widest hidden md:grid grid-cols-2 gap-4">
            <span>[Q/E] Shift Down/Up</span>
            <span>[WASD] Drive</span>
            <span>[SHIFT] Nitro</span>
            <span>[SPACE] Brake</span>
        </div>
    </div>

    <!-- GAME OVER -->
    <div id="game-over" class="hidden absolute inset-0 flex flex-col items-center justify-center z-50 bg-black/90 backdrop-blur-xl">
        <h2 class="text-5xl font-black italic text-red-600 mb-2">WRECKED</h2>
        <p id="final-score" class="text-2xl font-['Orbitron'] mb-12">SCORE: 000000</p>
        <button class="bg-white text-black px-12 py-4 rounded-full font-black uppercase tracking-widest" onclick="startGame()">Try Again</button>
    </div>
</div>

<script>
    /** AUDIO ENGINE **/
    class EngineSound {
        constructor() {
            this.ctx = null;
            this.osc = null;
            this.gain = null;
            this.turboGain = null;
            this.turboOsc = null;
            this.isBlowing = false;
        }
        init() {
            if (this.ctx) return;
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.osc = this.ctx.createOscillator();
            this.osc.type = 'sawtooth';
            this.gain = this.ctx.createGain();
            this.lowPass = this.ctx.createBiquadFilter();
            this.lowPass.type = 'lowpass';
            this.turboOsc = this.ctx.createOscillator();
            this.turboOsc.type = 'sine';
            this.turboGain = this.ctx.createGain();
            this.osc.connect(this.lowPass);
            this.lowPass.connect(this.gain);
            this.gain.connect(this.ctx.destination);
            this.turboOsc.connect(this.turboGain);
            this.turboGain.connect(this.ctx.destination);
            this.osc.start();
            this.turboOsc.start();
            this.gain.gain.value = 0.1;
            this.turboGain.gain.value = 0;
        }
        update(rpm, isNitro, isBouncing) {
            if (!this.ctx) return;
            let freq = 30 + (rpm * 0.02);
            if (isBouncing) freq *= 0.95; // Rev limiter sound
            this.osc.frequency.setTargetAtTime(freq, this.ctx.currentTime, 0.05);
            this.lowPass.frequency.setTargetAtTime(400 + (rpm * 0.2), this.ctx.currentTime, 0.1);
            if (rpm > 4000) {
                this.turboOsc.frequency.setTargetAtTime(800 + (rpm * 0.1), this.ctx.currentTime, 0.1);
                this.turboGain.gain.setTargetAtTime(isNitro ? 0.12 : 0.05, this.ctx.currentTime, 0.2);
            } else {
                this.turboGain.gain.setTargetAtTime(0, this.ctx.currentTime, 0.1);
            }
        }
        stututu(intensity = 1) {
            if (!this.ctx || this.isBlowing || intensity < 0.2) return;
            this.isBlowing = true;
            const now = this.ctx.currentTime;
            // Increased number of pulses and volume for "Louder Stututu"
            for(let i=0; i<6; i++) {
                const startTime = now + (i * 0.08);
                const blowGain = this.ctx.createGain();
                const noise = this.ctx.createBufferSource();
                const buffer = this.ctx.createBuffer(1, this.ctx.sampleRate * 0.15, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let j = 0; j < data.length; j++) data[j] = Math.random() * 2 - 1;
                noise.buffer = buffer;
                
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'bandpass'; 
                filter.frequency.value = 2200 - (i * 250);
                filter.Q.value = 1.5;

                noise.connect(filter); 
                filter.connect(blowGain); 
                blowGain.connect(this.ctx.destination);

                // Higher base gain for louder volume
                const volume = (0.4 * intensity) / (1 + i * 0.5); 
                blowGain.gain.setValueAtTime(volume, startTime);
                blowGain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.12);
                
                noise.start(startTime);
                noise.stop(startTime + 0.15);
            }
            setTimeout(() => { this.isBlowing = false; }, 800);
        }
    }

    const engine = new EngineSound();

    /** GAME DATA **/
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gearEl = document.getElementById('gear-display');
    const rpmFill = document.getElementById('rpm-fill');
    
    let gameActive = false, score = 0, distance = 0, gameSpeed = 0;
    let nitroAmount = 60, frameCount = 0, traffic = [], particles = [];
    let keys = {}, touchState = {};

    // Physics & Transmission
    let currentGear = 0; 
    let rpm = 800;
    const MAX_RPM = 8500;
    const REDLINE = 7500;
    const MAX_SPEEDS = [0, 35, 75, 130, 190, 260, 340]; 

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Inputs
    window.addEventListener('keydown', e => {
        if(e.code === 'KeyE') shiftUp();
        if(e.code === 'KeyQ') shiftDown();
        keys[e.code] = true;
    });
    
    window.addEventListener('keyup', e => {
        keys[e.code] = false;
        // Trigger stututu based on RPM when releasing gas
        if(e.code === 'KeyW' || e.code === 'ArrowUp') {
            const intensity = (rpm - 3000) / (MAX_RPM - 3000);
            engine.stututu(intensity);
        }
    });

    const setupTouch = (id, action) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(action === 'up') shiftUp();
            else if(action === 'down') shiftDown();
            else touchState[action] = true;
            engine.init();
        });
        el.addEventListener('touchend', (e) => {
            e.preventDefault();
            if(action === 'accel' || action === 'w') { // assuming touch accel mapping
                 const intensity = (rpm - 3000) / (MAX_RPM - 3000);
                 engine.stututu(intensity);
            }
            touchState[action] = false;
        });
    };
    setupTouch('btn-left', 'left'); setupTouch('btn-right', 'right');
    setupTouch('btn-up', 'up'); setupTouch('btn-down', 'down');
    setupTouch('btn-nitro', 'nitro');

    function updateGearUI() {
        gearEl.innerText = currentGear === 0 ? "N" : currentGear;
    }

    function shiftUp() {
        if(currentGear < 6) {
            const oldRpm = rpm;
            currentGear++;
            if (currentGear === 1) rpm *= 0.5;
            else rpm *= 0.7;
            updateGearUI();
            // Shift stututu
            const intensity = (oldRpm - 3000) / (MAX_RPM - 3000);
            engine.stututu(intensity);
        }
    }
    function shiftDown() {
        if(currentGear > 0) {
            currentGear--;
            if (currentGear > 0) {
                rpm = Math.min(MAX_RPM, rpm * 1.4);
            }
            updateGearUI();
        }
    }

    class Vehicle {
        constructor(x, y, color) {
            this.w = 56; this.h = 104; this.x = x; this.y = y; this.color = color;
        }
        draw(ctx, tilt = 0, isPlayer = false) {
            ctx.save();
            ctx.translate(this.x + this.w/2, this.y + this.h/2);
            ctx.rotate(tilt);
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.roundRect(-this.w/2+5, -this.h/2+5, this.w, this.h, 10); ctx.fill();
            ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.roundRect(-this.w/2, -this.h/2, this.w, this.h, 10); ctx.fill();
            ctx.fillStyle = '#111';
            ctx.fillRect(-this.w/2+8, -this.h/2+20, this.w-16, 25);
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(-this.w/2+12, -this.h/2+8, 5, 0, 7); ctx.fill();
            ctx.beginPath(); ctx.arc(this.w/2-12, -this.h/2+8, 5, 0, 7); ctx.fill();
            ctx.restore();
        }
    }

    function startGame() {
        gameActive = true; score = 0; distance = 0; gameSpeed = 0; currentGear = 0; rpm = 800;
        traffic = []; particles = [];
        playerX = canvas.width / 2 - 28;
        document.getElementById('start-menu').classList.add('hidden');
        document.getElementById('game-over').classList.add('hidden');
        document.getElementById('touch-controls').classList.remove('hidden');
        updateGearUI();
        requestAnimationFrame(gameLoop);
    }

    function initAndStart() { engine.init(); startGame(); }

    let playerX, playerTilt = 0;

    function gameLoop() {
        if (!gameActive) return;

        const isAccelerating = keys['KeyW'] || keys['ArrowUp'] || (window.innerWidth < 768 && !keys['Space'] && !touchState.brake);
        const isNitro = (keys['ShiftLeft'] || touchState.nitro) && nitroAmount > 1 && currentGear > 0;
        const isBraking = keys['Space'] || keys['KeyS'] || touchState.brake;

        if (isAccelerating) {
            let accelPower = (currentGear === 0) ? 550 : (1 - (rpm / MAX_RPM)) * 180; 
            rpm += accelPower + (isNitro ? 120 : 0);
        } else {
            rpm -= 180;
        }

        let isBouncing = false;
        if (rpm >= MAX_RPM) {
            rpm = MAX_RPM - 400;
            isBouncing = true;
            // Limiters trigger a small stututu if very high
            if (Math.random() > 0.8) engine.stututu(0.3);
        }
        rpm = Math.max(800, rpm);

        let targetSpeed = 0;
        if (currentGear > 0) {
            targetSpeed = (rpm / MAX_RPM) * MAX_SPEEDS[currentGear];
            if (isNitro) targetSpeed += 40;
            gameSpeed += (targetSpeed/10 - gameSpeed) * 0.05;
        } else {
            gameSpeed *= 0.99;
        }

        if (isBraking) gameSpeed *= 0.95;
        if (gameSpeed < 0.01) gameSpeed = 0;

        document.getElementById('speedo').innerText = Math.floor(gameSpeed * 10);
        const rpmPerc = (rpm / MAX_RPM) * 100;
        rpmFill.style.width = rpmPerc + '%';
        rpmFill.className = rpm > REDLINE ? 'redline-blink' : '';
        
        nitroAmount = Math.min(100, nitroAmount + (isNitro ? -0.8 : 0.05));
        document.getElementById('nitro-fill').style.width = nitroAmount + '%';
        document.getElementById('nitro-percent').innerText = Math.floor(nitroAmount) + '%';
        document.getElementById('score').innerText = Math.floor(score).toString().padStart(6, '0');

        engine.update(rpm, isNitro, isBouncing);

        ctx.fillStyle = '#0f0f12';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        distance += gameSpeed;
        ctx.setLineDash([40, 60]);
        ctx.lineDashOffset = -distance;
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        for(let i=1; i<4; i++) {
            ctx.beginPath(); ctx.moveTo(i * (canvas.width/4), 0); ctx.lineTo(i * (canvas.width/4), canvas.height); ctx.stroke();
        }

        if(keys['KeyA'] || keys['ArrowLeft'] || touchState.left) { playerX -= 8; playerTilt = -0.1; }
        else if(keys['KeyD'] || keys['ArrowRight'] || touchState.right) { playerX += 8; playerTilt = 0.1; }
        else { playerTilt *= 0.8; }
        playerX = Math.max(10, Math.min(canvas.width - 66, playerX));

        const player = new Vehicle(playerX, canvas.height - 180, '#ef4444');
        player.draw(ctx, playerTilt, true);

        if (frameCount % 40 === 0 && gameSpeed > 2) {
            traffic.push({
                x: Math.floor(Math.random() * 4) * (canvas.width/4) + (canvas.width/8) - 28,
                y: -150,
                speed: 5 + Math.random() * 5,
                color: '#3b82f6'
            });
        }
        frameCount++;

        for (let i = traffic.length - 1; i >= 0; i--) {
            let t = traffic[i];
            t.y += (gameSpeed - t.speed);
            const carObj = new Vehicle(t.x, t.y, t.color);
            carObj.draw(ctx);

            if (Math.abs(playerX - t.x) < 50 && Math.abs((canvas.height-180) - t.y) < 90) {
                gameActive = false;
                document.getElementById('game-over').classList.remove('hidden');
                document.getElementById('final-score').innerText = `SCORE: ${Math.floor(score)}`;
            }

            if (t.y > canvas.height + 100) {
                score += 100 + (gameSpeed * 2);
                traffic.splice(i, 1);
            }
        }
        requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
