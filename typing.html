<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Typing Interstellar - Iron Dome Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@500;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #020205;
            color: white;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: manipulation;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 1000px;
            height: 95vh;
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 16px;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
            background: #050508;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        canvas {
            flex-grow: 1;
            display: block;
            width: 100%;
        }

        /* UI Styling */
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 10;
        }

        .glass-panel {
            background: rgba(10, 10, 20, 0.8);
            padding: 10px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: auto;
        }

        .label {
            font-size: 0.6rem;
            letter-spacing: 2px;
            color: #00f2ff;
            margin-bottom: 2px;
            text-transform: uppercase;
        }

        .value {
            font-size: 1.3rem;
            font-weight: 900;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        #pause-btn {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid #00f2ff;
            color: #00f2ff;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            pointer-events: auto;
            transition: 0.3s;
            font-size: 0.8rem;
            font-weight: bold;
        }
        #pause-btn:hover { background: #00f2ff; color: #000; }

        /* Keyboard */
        #mobile-keyboard {
            display: none;
            grid-template-columns: repeat(10, 1fr);
            gap: 6px;
            padding: 15px;
            background: #0a0a0f;
            border-top: 1px solid rgba(0, 242, 255, 0.2);
        }

        @media (max-width: 768px) {
            #mobile-keyboard { display: grid; }
            #game-container { height: 100vh; border-radius: 0; border: none; }
        }

        .key {
            background: linear-gradient(145deg, #151525, #0a0a15);
            border: 1px solid rgba(0, 242, 255, 0.3);
            color: #00f2ff;
            padding: 14px 0;
            text-align: center;
            border-radius: 6px;
            font-weight: bold;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
        }

        /* Screens */
        .overlay-screen {
            position: absolute;
            inset: 0;
            background: rgba(2, 2, 5, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }

        .btn-premium {
            background: linear-gradient(90deg, #00f2ff, #0066ff);
            color: white;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            transition: all 0.3s ease;
            margin-top: 10px;
            border: none;
            cursor: pointer;
        }
        .btn-premium:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.5);
        }

        .difficulty-btn {
            width: 200px;
            margin: 5px;
            padding: 12px;
            border: 1px solid rgba(0, 242, 255, 0.5);
            background: rgba(255,255,255,0.05);
            color: #00f2ff;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .difficulty-btn:hover {
            background: rgba(0, 242, 255, 0.2);
        }
        .difficulty-btn.active {
            background: #00f2ff;
            color: black;
            box-shadow: 0 0 15px #00f2ff;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-overlay">
        <div class="glass-panel">
            <div class="label">Score</div>
            <div id="score-val" class="value">0000</div>
        </div>
        <div class="flex flex-col gap-2">
            <div class="glass-panel text-center" style="border-color: rgba(251, 191, 36, 0.4);">
                <div class="label" style="color: #fbbf24;">Sector</div>
                <div id="level-val" class="value" style="color: #fbbf24;">1</div>
            </div>
            <button id="pause-btn" onclick="togglePause()">PAUSE</button>
        </div>
        <div class="glass-panel text-right" style="border-color: rgba(239, 68, 68, 0.4);">
            <div class="label" style="color: #ef4444;">Shields</div>
            <div id="life-val" class="value" style="color: #ef4444;">3</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="mobile-keyboard"></div>

    <!-- Start Screen -->
    <div id="start-screen" class="overlay-screen">
        <h1 class="text-5xl font-black mb-2 tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-500 italic text-center">IRON DOME</h1>
        <h2 class="text-xl font-bold mb-6 text-cyan-400 tracking-[0.5em] text-center uppercase">Commander</h2>
        
        <div class="flex flex-col items-center gap-2 mb-8">
            <p class="text-[10px] text-cyan-500/50 uppercase tracking-widest mb-2">Select Difficulty</p>
            <button class="difficulty-btn" onclick="setDifficulty('easy', this)">EASY</button>
            <button class="difficulty-btn active" onclick="setDifficulty('medium', this)">MEDIUM</button>
            <button class="difficulty-btn" onclick="setDifficulty('hard', this)">HARD</button>
        </div>

        <button class="btn-premium" onclick="startGame()">ENGAGE DEFENSE</button>
        <p class="text-[10px] text-gray-500 mt-6 tracking-widest">[ PRESS ENTER TO BEGIN ]</p>
    </div>

    <!-- Pause Screen -->
    <div id="pause-screen" class="overlay-screen hidden">
        <h1 class="text-6xl font-black mb-8 italic text-white text-center">DEFENSE<br>PAUSED</h1>
        <button class="btn-premium" onclick="togglePause()">RESUME</button>
    </div>

    <!-- Level Pop-up -->
    <div id="level-popup" class="overlay-screen hidden">
        <h3 class="text-sm tracking-[1em] text-cyan-400 mb-2">THREAT NEUTRALIZED</h3>
        <h1 id="next-level-title" class="text-6xl font-black mb-4 italic">SECTOR 2</h1>
        <p class="text-xs text-cyan-500/50 mb-4 animate-pulse">[ PRESS ENTER TO PROCEED ]</p>
        <button class="btn-premium" onclick="startNextLevel()">PROCEED</button>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over" class="overlay-screen hidden">
        <h1 class="text-5xl font-black mb-2 text-red-600 italic">BASE COMPROMISED</h1>
        <div id="final-stats" class="mb-6 text-center">
            <p class="text-5xl font-black" id="final-score">0</p>
            <p class="text-xs tracking-widest text-cyan-400 uppercase">Total Score</p>
            <p class="text-[10px] text-gray-500 mt-4">[ PRESS ENTER TO RETRY ]</p>
        </div>
        <button class="btn-premium" style="background: white; color: black;" onclick="location.reload()">RETRY MISSION</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score-val');
    const levelEl = document.getElementById('level-val');
    const lifeEl = document.getElementById('life-val');
    
    const startScreen = document.getElementById('start-screen');
    const pauseScreen = document.getElementById('pause-screen');
    const gameOverScreen = document.getElementById('game-over');
    const levelPopup = document.getElementById('level-popup');
    const nextLevelTitle = document.getElementById('next-level-title');

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, type, duration, vol) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    const WORDS = [
        "ACE", "JET", "SKY", "FOX", "FLY", "RUN", "GUN", "MAP", "ICE", "HOT",
        "FIRE", "BLUE", "CORE", "DARK", "FAST", "GOAL", "SHIP", "STAR", "MOON",
        "POWER", "SPACE", "LIGHT", "SPEED", "LASER", "STORM", "CLOUD", "EARTH",
        "PLANET", "ROCKET", "GALAXY", "SYSTEM", "SHIELD", "DANGER", "VECTOR",
        "COMMAND", "STATION", "BEYOND", "NEBULA", "VOYAGE", "STRIKE", "RESCUE"
    ];

    const BOSS_WORDS = ["INTERSTELLAR", "SUPERNOVA", "BLACKHOLE", "CONSTELLATION", "METEORITE", "ASTRONAUT", "SPACESHIP", "GRAVITATION", "UNIVERSE", "INFINITY"];

    let score = 0, lives = 3, level = 1;
    let gameActive = false, isPaused = false, waitingForLevel = false, isGameOver = false;
    let enemies = [], lasers = [], particles = [], currentTarget = null;
    let spawnTimer = 0, enemiesDestroyedInLevel = 0, bossSpawned = false;
    let muzzleFlash = 0;
    
    // Difficulty Settings
    let currentDifficulty = 'medium';
    const difficultyConfigs = {
        easy: { speedMultiplier: 1.0, spawnRate: 200, bonus: 1 },
        medium: { speedMultiplier: 2.0, spawnRate: 100, bonus: 1.5 },
        hard: { speedMultiplier: 3.5, spawnRate: 50, bonus: 2.5 }
    };

    function setDifficulty(diff, btn) {
        currentDifficulty = diff;
        document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        playSound(300, 'sine', 0.1, 0.1);
    }

    const enemiesToClearLevel = 8; 

    class Enemy {
        constructor(isBoss = false) {
            const config = difficultyConfigs[currentDifficulty];
            this.isBoss = isBoss;
            if (isBoss) {
                this.word = BOSS_WORDS[Math.floor(Math.random() * BOSS_WORDS.length)];
                this.speed = 0.25 * config.speedMultiplier; 
                this.size = 2.2; 
                this.color = '#ffcc00';
            } else {
                let maxLength = 3 + Math.floor(level / 2);
                let filtered = WORDS.filter(w => w.length >= 3 && w.length <= maxLength);
                this.word = filtered[Math.floor(Math.random() * filtered.length)];
                // Mod Hard: speedMultiplier memecutkan musuh dengan ketara
                this.speed = (0.35 + (level * 0.05)) * config.speedMultiplier; 
                this.size = 1;
                this.color = `hsl(${(level * 40) % 360}, 100%, 70%)`;
            }
            this.typed = "";
            this.x = Math.random() * (canvas.width - 200) + 100;
            this.y = -60;
            this.pulse = 0;
        }

        update() {
            if (isPaused) return;
            this.y += this.speed;
            this.pulse += 0.05;
            if (this.y > canvas.height - 80) this.destroy(true);
        }

        draw() {
            const s = this.size;
            ctx.save();
            ctx.translate(this.x, this.y);
            
            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
            ctx.fillStyle = this.color;
            
            ctx.beginPath();
            ctx.moveTo(0, 20 * s);
            ctx.lineTo(-15 * s, -10 * s);
            ctx.lineTo(-5 * s, -15 * s);
            ctx.lineTo(0, -5 * s);
            ctx.lineTo(5 * s, -15 * s);
            ctx.lineTo(15 * s, -10 * s);
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(-15 * s, -5 * s);
            ctx.lineTo(-30 * s, 0);
            ctx.lineTo(-15 * s, 5 * s);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(15 * s, -5 * s);
            ctx.lineTo(30 * s, 0);
            ctx.lineTo(15 * s, 5 * s);
            ctx.fill();

            ctx.restore();

            ctx.font = this.isBoss ? 'bold 28px "JetBrains Mono"' : '800 22px "JetBrains Mono"';
            const tw = ctx.measureText(this.word).width;
            
            ctx.fillStyle = 'rgba(0,0,0,0.85)';
            ctx.beginPath();
            ctx.roundRect(this.x - (tw/2) - 15, this.y + 35, tw + 30, 45, 8);
            ctx.fill();
            ctx.strokeStyle = this.typed.length > 0 ? this.color : 'rgba(255,255,255,0.2)';
            ctx.lineWidth = this.isBoss ? 3 : 2;
            ctx.stroke();

            const sx = this.x - tw/2;
            ctx.textAlign = 'left';
            ctx.fillStyle = this.color;
            ctx.fillText(this.typed, sx, this.y + 65);
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.fillText(this.word.substring(this.typed.length), sx + ctx.measureText(this.typed).width, this.y + 65);
        }

        destroy(missed = false) {
            if (missed) {
                lives--;
                updateUI();
                playSound(80, 'square', 0.6, 0.2);
                if (lives <= 0) endGame();
            } else {
                const config = difficultyConfigs[currentDifficulty];
                score += Math.floor(this.word.length * (this.isBoss ? 50 : 20) * config.bonus);
                enemiesDestroyedInLevel++;
                updateUI();
                playSound(150, 'sine', 0.2, 0.3);
                const count = this.isBoss ? 45 : 18;
                for(let i=0; i<count; i++) particles.push(new Particle(this.x, this.y, this.color));
                
                if (enemiesDestroyedInLevel >= enemiesToClearLevel && !this.isBoss && !bossSpawned) {
                    enemies.push(new Enemy(true));
                    bossSpawned = true;
                } else if (this.isBoss) {
                    levelClear();
                }
            }
            enemies = enemies.filter(e => e !== this);
            if (currentTarget === this) currentTarget = null;
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y; this.color = color;
            this.vx = (Math.random()-0.5)*12; this.vy = (Math.random()-0.5)*12;
            this.life = 1.0;
        }
        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, 4, 4);
            if(!isPaused) {
                this.x += this.vx; this.y += this.vy; this.life -= 0.02;
            }
            ctx.globalAlpha = 1.0;
        }
    }

    function togglePause() {
        if (!gameActive || waitingForLevel || isGameOver) return;
        isPaused = !isPaused;
        pauseScreen.classList.toggle('hidden', !isPaused);
        if (!isPaused) requestAnimationFrame(gameLoop);
    }

    function levelClear() {
        gameActive = false;
        waitingForLevel = true;
        levelPopup.classList.remove('hidden');
        nextLevelTitle.textContent = `SECTOR ${level + 1}`;
        playSound(440, 'triangle', 0.5, 0.2);
    }

    function startNextLevel() {
        level++;
        enemiesDestroyedInLevel = 0;
        bossSpawned = false;
        enemies = [];
        lasers = [];
        levelPopup.classList.add('hidden');
        waitingForLevel = false;
        gameActive = true;
        updateUI();
        requestAnimationFrame(gameLoop);
    }

    function handleInput(char) {
        if (!gameActive || isPaused || waitingForLevel || isGameOver) return;
        const key = char.toUpperCase();

        if (!currentTarget) {
            // Utamakan musuh yang paling bawah (paling bahaya)
            const sortedEnemies = [...enemies].sort((a,b) => b.y - a.y);
            currentTarget = sortedEnemies.find(e => e.word[0] === key && e.y > 0);
        }

        if (currentTarget) {
            if (key === currentTarget.word[currentTarget.typed.length]) {
                currentTarget.typed += key;
                muzzleFlash = 5; 
                playSound(600, 'sawtooth', 0.1, 0.1);
                lasers.push({x1: canvas.width/2, y1: canvas.height-85, x2: currentTarget.x, y2: currentTarget.y, life: 8});
                if (currentTarget.typed === currentTarget.word) currentTarget.destroy();
            }
        }
    }

    function updateUI() {
        scoreEl.textContent = score.toString().padStart(4, '0');
        levelEl.textContent = level;
        lifeEl.textContent = lives;
    }

    function drawIronDome() {
        const cx = canvas.width/2;
        const cy = canvas.height - 80;

        ctx.save();
        ctx.translate(cx, cy);

        ctx.fillStyle = '#1a1a2e';
        ctx.strokeStyle = '#00f2ff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.rect(-35, 10, 70, 30);
        ctx.fill();
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(-25, 10);
        ctx.lineTo(-20, -10);
        ctx.lineTo(20, -10);
        ctx.lineTo(25, 10);
        ctx.fill();
        ctx.stroke();

        if (muzzleFlash > 0) {
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#00f2ff';
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(0, -50, muzzleFlash * 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            muzzleFlash--;
        }

        ctx.fillStyle = '#2d2d44';
        ctx.beginPath();
        ctx.roundRect(-8, -55, 16, 50, 4);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = '#00f2ff';
        ctx.fillRect(-8, -55, 16, 8);

        ctx.restore();
    }

    function gameLoop() {
        if (!gameActive || isPaused || isGameOver) return;

        const config = difficultyConfigs[currentDifficulty];
        spawnTimer++;
        // Mod Hard: Spawn rate lebih rendah bermaksud musuh muncul lebih kerap
        if (spawnTimer > config.spawnRate && enemiesDestroyedInLevel < enemiesToClearLevel && enemies.length < (2 + Math.floor(level/3))) {
            enemies.push(new Enemy());
            spawnTimer = 0;
        }

        ctx.fillStyle = '#050508';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Stars animation
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        for(let i=0; i<60; i++) {
            let y = (Date.now()*0.03 + i*100) % canvas.height;
            ctx.fillRect((i*163)%canvas.width, y, 2, 2);
        }

        enemies.forEach(e => { e.update(); e.draw(); });
        
        lasers = lasers.filter(l => {
            ctx.strokeStyle = '#00f2ff';
            ctx.lineWidth = l.life;
            ctx.beginPath(); ctx.moveTo(l.x1, l.y1); ctx.lineTo(l.x2, l.y2); ctx.stroke();
            l.life--; return l.life > 0;
        });

        particles = particles.filter(p => { p.draw(); return p.life > 0; });

        drawIronDome();

        requestAnimationFrame(gameLoop);
    }

    function startGame() {
        if (gameActive) return;
        startScreen.classList.add('hidden');
        gameActive = true;
        isGameOver = false;
        updateUI();
        resize();
        gameLoop();
        playSound(200, 'square', 0.2, 0.2);
    }

    function endGame() {
        gameActive = false;
        isGameOver = true;
        gameOverScreen.classList.remove('hidden');
        document.getElementById('final-score').textContent = score;
    }

    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }

    const layout = "QWERTYUIOPASDFGHJKLZXCVBNM".split("");
    layout.forEach(k => {
        const d = document.createElement('div');
        d.className = 'key'; d.textContent = k;
        d.onmousedown = (e) => { e.preventDefault(); handleInput(k); };
        d.ontouchstart = (e) => { e.preventDefault(); handleInput(k); };
        document.getElementById('mobile-keyboard').appendChild(d);
    });

    window.addEventListener('keydown', e => {
        if (e.key === 'Escape' || e.key === ' ') {
            togglePause();
        } else if (e.key === 'Enter') {
            if (!gameActive && !waitingForLevel && !isGameOver) {
                startGame();
            } else if (waitingForLevel) {
                startNextLevel();
            } else if (isGameOver) {
                location.reload();
            }
        } else {
            handleInput(e.key);
        }
    });
    window.addEventListener('resize', resize);
    resize();
</script>
</body>
</html>
