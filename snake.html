<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Life as a Snake - Enhanced Forest</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body { 
            margin: 0; 
            overflow: hidden; 
            background: #87CEEB; 
            font-family: 'Press Start 2P', cursive;
            user-select: none;
            touch-action: none;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        .panel {
            background: rgba(0, 0, 0, 0.85);
            border: 4px solid #444;
            color: #fff;
            padding: 15px;
            display: inline-block;
            box-shadow: 4px 4px 0px #000;
            pointer-events: auto;
        }

        /* Compass */
        #compass-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 260px;
            height: 34px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #a89160;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #compass-strip {
            position: absolute;
            display: flex;
            white-space: nowrap;
            transition: transform 0.05s linear;
            color: #eee;
            font-size: 10px;
        }
        .compass-mark { width: 100px; text-align: center; }
        .compass-center-marker {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 100%;
            background: #a89160;
            z-index: 11;
        }

        #coord-text {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 8px;
            text-shadow: 1px 1px #000;
        }

        /* Stamina Bar */
        .stamina-panel { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        .label { font-size: 10px; color: #4ade80; margin-bottom: 8px; }
        .bar-container { width: 140px; height: 10px; background: #222; border: 2px solid #555; }
        .bar-fill { height: 100%; width: 100%; transition: width 0.3s; background: #3b82f6; }

        /* Radar */
        #radar-panel { position: absolute; top: 20px; right: 20px; text-align: center; padding: 10px; }
        #radar-canvas { width: 80px; height: 80px; background: rgba(0, 0, 0, 0.6); border: 2px solid #4ade80; display: block; }

        /* Mobile Controls */
        #touch-controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            height: 160px;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
        }
        .joystick-area {
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.1);
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            position: relative;
            pointer-events: auto;
        }
        #joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .touch-btn {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.15);
            border: 3px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 10px;
            pointer-events: auto;
            margin-top: 20px;
        }
        .touch-btn:active { background: rgba(255,255,255,0.4); }

        /* Menus */
        #pause-btn {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            margin-top: 60px;
            padding: 8px 15px;
            font-size: 10px;
            cursor: pointer;
            pointer-events: auto;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            visibility: hidden;
        }
        #overlay.visible { visibility: visible; }
        .menu-title { font-size: 24px; margin-bottom: 30px; color: #4ade80; }
        .menu-btn {
            width: 240px;
            padding: 15px;
            margin: 10px;
            background: #333;
            border: 4px solid #555;
            color: white;
            cursor: pointer;
            text-align: center;
            font-size: 12px;
        }
        .menu-btn:hover { background: #444; border-color: #4ade80; }

        #dialogue {
            position: absolute;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 500px;
            text-align: center;
            display: none;
            pointer-events: none;
        }

        #canvas-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="overlay">
        <div class="menu-title">PAUSED</div>
        <div class="menu-btn" onclick="togglePause()">RESUME</div>
        <div class="menu-btn" onclick="location.reload()">RESTART</div>
        <div style="margin-top: 20px; font-size: 8px; color: #aaa; text-align: center; line-height: 1.6;">
            A/D OR JOYSTICK TO TURN<br>
            SPACE OR BUTTON TO JUMP<br>
            S TO STOP
        </div>
    </div>

    <div id="ui-layer">
        <div class="stamina-panel">
            <div class="label">STAMINA</div>
            <div class="bar-container">
                <div id="growth-fill" class="bar-fill"></div>
            </div>
        </div>

        <div id="compass-container">
            <div class="compass-center-marker"></div>
            <div id="compass-strip"></div>
        </div>
        <div id="coord-text">X: 0 | Z: 0</div>

        <button id="pause-btn" class="panel" onclick="togglePause()">II PAUSE</button>

        <div id="radar-panel" class="panel">
            <canvas id="radar-canvas" width="100" height="100"></canvas>
        </div>

        <div id="touch-controls">
            <div class="joystick-area" id="joystick-boundary">
                <div id="joystick-knob"></div>
            </div>
            <div class="touch-btn" id="jump-btn">JUMP</div>
        </div>

        <div id="dialogue" class="panel"></div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const WORLD_SIZE = 4000; 
        const GRAVITY = -450; 
        const JUMP_FORCE = 160; 
        const SEGMENT_SPACING = 12.0; 
        const MAX_PATH_LENGTH = 1200;
        const ROTATION_SMOOTHING = 0.12; 

        let scene, camera, renderer, clock, radarCtx, sun, amb;
        let snakeHead, segments = [], path = [];
        let apples = [], creatures = [], flowers = [];
        let input = { left: false, right: false, stop: false, jump: false };
        
        let matSnake, matWood, matApple, matLeaf;
        let texGrass;
        const geoBox = new THREE.BoxGeometry(1, 1, 1);
        let matFlowerStem, matFlowerCenter, matFlowerPetals = [];
        let matAppleStem, matCreatures = {};

        let currentRotation = 0;
        let targetRotation = 0;
        let stamina = 100;
        let yVelocity = 0;
        let isJumping = false;
        let cameraShake = 0;
        let isPaused = false;

        let audioCtx = null;
        let ambientGain = null;

        // Joystick State
        let joystickActive = false;
        let joystickPos = { x: 0, y: 0 };
        const joystickLimit = 50;

        /** AUDIO */
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            startAmbientForest();
        }

        function startAmbientForest() {
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            noise.loop = true;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 400;

            ambientGain = audioCtx.createGain();
            ambientGain.gain.value = 0.05;

            noise.connect(filter);
            filter.connect(ambientGain);
            ambientGain.connect(audioCtx.destination);
            noise.start();
        }

        function playAnimalSound(type) {
            if (!audioCtx || isPaused) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.connect(g);
            g.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'sheep') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
                g.gain.setValueAtTime(0, now);
                g.gain.linearRampToValueAtTime(0.1, now + 0.05);
                g.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'chicken') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.05);
                g.gain.setValueAtTime(0, now);
                g.gain.linearRampToValueAtTime(0.05, now + 0.02);
                g.gain.linearRampToValueAtTime(0, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'wolf') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(300, now + 0.5);
                g.gain.linearRampToValueAtTime(0.08, now + 0.2);
                g.gain.linearRampToValueAtTime(0, now + 1.2);
                osc.start(now); osc.stop(now + 1.2);
            } else {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                g.gain.linearRampToValueAtTime(0.05, now + 0.05);
                g.gain.linearRampToValueAtTime(0, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            }
        }

        /** ENGINE */
        function init() {
            scene = new THREE.Scene();
            clock = new THREE.Clock();
            radarCtx = document.getElementById('radar-canvas').getContext('2d');

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 8000);
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            
            const skyColor = new THREE.Color(0x87CEEB); 
            renderer.setClearColor(skyColor);
            scene.fog = new THREE.Fog(skyColor, 1500, 4500);

            document.getElementById('canvas-container').appendChild(renderer.domElement);

            sun = new THREE.DirectionalLight(0xffffff, 1.2); 
            sun.position.set(400, 800, 400);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 1024; // Lowered for better perf on mobile
            sun.shadow.mapSize.height = 1024;
            sun.shadow.camera.left = -1500; sun.shadow.camera.right = 1500;
            sun.shadow.camera.top = 1500; sun.shadow.camera.bottom = -1500;
            sun.shadow.bias = -0.001;
            scene.add(sun);
            
            amb = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(amb);

            texGrass = generatePixelTexture(['#3e4d10', '#4b5d16', '#5a6b1a', '#6a7d25', '#7b8c38'], 64);
            texGrass.wrapS = texGrass.wrapT = THREE.RepeatWrapping;
            texGrass.repeat.set(128, 128);

            matSnake = new THREE.MeshPhongMaterial({ color: 0x1d351a, flatShading: true });
            matWood = new THREE.MeshPhongMaterial({ color: 0x3d2b1f, flatShading: true });
            matApple = new THREE.MeshPhongMaterial({ color: 0x9e1a1a, flatShading: true });
            matLeaf = new THREE.MeshPhongMaterial({ color: 0x2d3e1a, flatShading: true }); 
            matFlowerStem = new THREE.MeshPhongMaterial({color: 0x228B22});
            matFlowerCenter = new THREE.MeshPhongMaterial({color: 0xffaa00});
            matAppleStem = new THREE.MeshPhongMaterial({color: 0x4b3621});
            
            [0xff5555, 0xffff55, 0x55ff55, 0xff55ff].forEach(c => matFlowerPetals.push(new THREE.MeshPhongMaterial({color: c})));
            matCreatures = {
                'sheep': new THREE.MeshPhongMaterial({color: 0xEEEEEE}),
                'wolf': new THREE.MeshPhongMaterial({color: 0x777777}),
                'chicken': new THREE.MeshPhongMaterial({color: 0xFFFFFF}),
                'cat': new THREE.MeshPhongMaterial({color: 0xFFAA00})
            };

            const terrainGeo = new THREE.PlaneGeometry(WORLD_SIZE, WORLD_SIZE, 100, 100);
            const vertices = terrainGeo.attributes.position.array;
            for (let i = 0; i < vertices.length; i += 3) vertices[i + 2] = getTerrainHeight(vertices[i], -vertices[i+1]);
            terrainGeo.computeVertexNormals();
            const floor = new THREE.Mesh(terrainGeo, new THREE.MeshPhongMaterial({ map: texGrass, shininess: 0 }));
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            snakeHead = new THREE.Group();
            const headMesh = new THREE.Mesh(geoBox, matSnake); headMesh.scale.set(9, 7.5, 12);
            headMesh.castShadow = headMesh.receiveShadow = true;
            
            const eyeMat = new THREE.MeshBasicMaterial({color: 0x000000});
            const eyeL = new THREE.Mesh(geoBox, eyeMat); eyeL.scale.set(2, 2, 2); eyeL.position.set(3.5, 2.5, 4);
            const eyeR = new THREE.Mesh(geoBox, eyeMat); eyeR.scale.set(2, 2, 2); eyeR.position.set(-3.5, 2.5, 4);
            const tongue = new THREE.Mesh(geoBox, new THREE.MeshBasicMaterial({color: 0xff0000}));
            tongue.scale.set(2, 0.5, 4); tongue.position.set(0, -1, 7);
            
            snakeHead.add(headMesh, eyeL, eyeR, tongue);
            scene.add(snakeHead);
            snakeHead.position.set(0, getTerrainHeight(0,0) + 5, 0);

            for(let i=0; i<MAX_PATH_LENGTH; i++) path.push({x:0, y:snakeHead.position.y, z:0, r:0});

            populateGarden();
            initCompassUI();
            initTouchHandlers();

            window.addEventListener('keydown', e => {
                initAudio();
                if (e.code === 'Escape') togglePause();
                handleKey(e.code, true);
            });
            window.addEventListener('keyup', e => handleKey(e.code, false));
            window.addEventListener('resize', onResize);

            notify("TAP SCREEN OR PRESS ANY KEY TO START");
            loop();
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('overlay').className = isPaused ? 'visible' : '';
            if (ambientGain) {
                ambientGain.gain.setTargetAtTime(isPaused ? 0.01 : 0.05, audioCtx.currentTime, 0.2);
            }
        }

        /** TOUCH CONTROLS */
        function initTouchHandlers() {
            const jBox = document.getElementById('joystick-boundary');
            const jKnob = document.getElementById('joystick-knob');
            const jumpBtn = document.getElementById('jump-btn');

            const moveKnob = (e) => {
                const touch = e.touches ? e.touches[0] : e;
                const rect = jBox.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                let dx = touch.clientX - centerX;
                let dy = touch.clientY - centerY;
                
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > joystickLimit) {
                    dx = (dx / dist) * joystickLimit;
                    dy = (dy / dist) * joystickLimit;
                }

                jKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                joystickPos.x = dx / joystickLimit;
                joystickPos.y = dy / joystickLimit;
            };

            jBox.addEventListener('touchstart', (e) => {
                initAudio();
                joystickActive = true;
                moveKnob(e);
            }, {passive: false});

            window.addEventListener('touchmove', (e) => {
                if (joystickActive) moveKnob(e);
            }, {passive: false});

            window.addEventListener('touchend', () => {
                joystickActive = false;
                joystickPos = { x: 0, y: 0 };
                jKnob.style.transform = `translate(-50%, -50%)`;
            });

            jumpBtn.addEventListener('touchstart', (e) => {
                initAudio();
                input.jump = true;
                e.preventDefault();
            });
            jumpBtn.addEventListener('touchend', () => input.jump = false);
        }

        function getTerrainHeight(x, z) {
            const d = Math.sqrt(x*x + z*z);
            let h = 0;
            if (d < 800) h += Math.cos((d / 800) * Math.PI) * 150 + 150;
            h += Math.sin(x * 0.01) * 20 + Math.cos(z * 0.015) * 20;
            return h;
        }

        function generatePixelTexture(colors, size = 64) { 
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = size;
            const ctx = canvas.getContext('2d');
            for(let x=0; x<size; x++) {
                for(let y=0; y<size; y++) {
                    ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                    ctx.fillRect(x, y, 1, 1);
                }
            }
            return new THREE.CanvasTexture(canvas);
        }

        function populateGarden() {
            const limit = (WORLD_SIZE / 2) - 300;
            // Simplified density for stability
            for(let i=0; i<80; i++) {
                const group = new THREE.Group();
                const h = 60 + Math.random() * 100;
                const trunk = new THREE.Mesh(geoBox, matWood);
                trunk.scale.set(12, h, 12); trunk.position.y = h/2;
                trunk.castShadow = true;
                const foliage = new THREE.Mesh(geoBox, matLeaf);
                foliage.scale.set(60, 50, 60); foliage.position.y = h + 20;
                foliage.castShadow = true;
                group.add(trunk, foliage);
                const x = (Math.random()-0.5)*limit*2, z = (Math.random()-0.5)*limit*2;
                group.position.set(x, getTerrainHeight(x, z), z);
                scene.add(group);
            }
            for(let i=0; i<60; i++) {
                const flower = new THREE.Group();
                const stem = new THREE.Mesh(geoBox, matFlowerStem);
                stem.scale.set(1.5, 10, 1.5); stem.position.y = 5;
                flower.add(stem);
                const x = (Math.random()-0.5)*limit*2, z = (Math.random()-0.5)*limit*2;
                flower.position.set(x, getTerrainHeight(x, z), z);
                scene.add(flower);
            }
            for(let i=0; i<40; i++) spawnApple();
            const types = ['cat', 'chicken', 'sheep', 'wolf'];
            for(let i=0; i<25; i++) {
                const type = types[Math.floor(Math.random()*types.length)];
                const mesh = new THREE.Group();
                const b = new THREE.Mesh(geoBox, matCreatures[type]); b.scale.set(8, 6, 12); b.position.y = 3; b.castShadow = true;
                mesh.add(b);
                const x = (Math.random()-0.5)*limit*2, z = (Math.random()-0.5)*limit*2;
                mesh.position.set(x, getTerrainHeight(x, z), z);
                scene.add(mesh);
                creatures.push({ mesh, speed: type==='wolf'?130:70, timer: Math.random()*5, state:'idle', type });
            }
        }

        function spawnApple() {
            const apple = new THREE.Mesh(geoBox, matApple);
            apple.scale.set(5, 5, 5); apple.castShadow = true;
            const limit = (WORLD_SIZE / 2) - 150;
            const x = (Math.random()-0.5)*limit*2, z = (Math.random()-0.5)*limit*2;
            apple.position.set(x, getTerrainHeight(x, z) + 4, z);
            scene.add(apple);
            apples.push(apple);
        }

        function loop() {
            requestAnimationFrame(loop);
            if (isPaused) return;

            const delta = Math.min(clock.getDelta(), 0.05);
            const elapsed = clock.getElapsedTime();
            
            updateSnake(delta, elapsed);
            updateCreatures(delta, elapsed);
            updateCamera();
            updateCompassUI();
            drawRadar();
            
            renderer.render(scene, camera);
        }

        function updateSnake(dt, elapsed) {
            // Combined Keyboard + Joystick input
            if (input.left || joystickPos.x < -0.3) targetRotation += 3.5 * dt;
            if (input.right || joystickPos.x > 0.3) targetRotation -= 3.5 * dt;
            
            currentRotation += (targetRotation - currentRotation) * ROTATION_SMOOTHING;
            
            if(!input.stop && stamina > 0) stamina -= 2.0 * dt;
            const currentSpeed = (input.stop || stamina <= 0) ? 0 : 200;
            
            snakeHead.position.x += Math.sin(currentRotation) * currentSpeed * dt;
            snakeHead.position.z += Math.cos(currentRotation) * currentSpeed * dt;
            snakeHead.rotation.y = currentRotation;
            
            yVelocity += GRAVITY * dt;
            snakeHead.position.y += yVelocity * dt;

            const borderLimit = (WORLD_SIZE / 2) - 40;
            if (Math.abs(snakeHead.position.x) > borderLimit || Math.abs(snakeHead.position.z) > borderLimit) {
                snakeHead.position.x = Math.max(-borderLimit, Math.min(borderLimit, snakeHead.position.x));
                snakeHead.position.z = Math.max(-borderLimit, Math.min(borderLimit, snakeHead.position.z));
                targetRotation += Math.PI * 0.5;
                cameraShake = 10;
            }

            const ground = getTerrainHeight(snakeHead.position.x, snakeHead.position.z) + 5;
            if (snakeHead.position.y < ground) { 
                snakeHead.position.y = ground; 
                yVelocity = 0; 
                isJumping = false; 
            }

            if ((input.jump) && !isJumping) {
                yVelocity = JUMP_FORCE;
                isJumping = true;
            }

            path.unshift({ x: snakeHead.position.x, y: snakeHead.position.y, z: snakeHead.position.z, r: currentRotation });
            if (path.length > MAX_PATH_LENGTH) path.pop();

            for(let i = apples.length - 1; i >= 0; i--) {
                const a = apples[i];
                if (snakeHead.position.distanceTo(a.position) < 30) {
                    stamina = Math.min(100, stamina + 25);
                    const limit = (WORLD_SIZE/2)-200;
                    a.position.set((Math.random()-0.5)*limit*2, 0, (Math.random()-0.5)*limit*2);
                    a.position.y = getTerrainHeight(a.position.x, a.position.z) + 4;
                }
            }

            document.getElementById('growth-fill').style.width = stamina + '%';

            const segmentCount = 12;
            let pathPtr = 1;
            for(let i = 0; i < segmentCount; i++) {
                if (!segments[i]) {
                    const s = new THREE.Mesh(geoBox, matSnake);
                    s.scale.set(8, 6, 10); s.castShadow = true;
                    scene.add(s); segments[i] = s;
                }
                const prev = (i === 0) ? snakeHead.position : segments[i-1].position;
                while (pathPtr < path.length - 2) {
                    const p = path[pathPtr];
                    const d = Math.sqrt((p.x-prev.x)**2 + (p.z-prev.z)**2);
                    if (d >= SEGMENT_SPACING) {
                        segments[i].position.set(p.x, p.y, p.z);
                        segments[i].rotation.y = p.r; 
                        break;
                    }
                    pathPtr++;
                }
            }
        }

        function updateCreatures(dt, elapsed) {
            for(let c of creatures) {
                c.timer -= dt;
                if(c.timer < 0) {
                    c.state = Math.random() > 0.4 ? 'move' : 'idle';
                    c.timer = 3 + Math.random() * 5;
                    if(c.state === 'move') {
                        c.mesh.rotation.y = Math.random() * Math.PI * 2;
                        if (Math.random() > 0.7 && snakeHead.position.distanceTo(c.mesh.position) < 400) playAnimalSound(c.type);
                    }
                }
                const groundY = getTerrainHeight(c.mesh.position.x, c.mesh.position.z);
                if(c.state === 'move') {
                    c.mesh.position.x += Math.sin(c.mesh.rotation.y) * c.speed * dt;
                    c.mesh.position.z += Math.cos(c.mesh.rotation.y) * c.speed * dt;
                    c.mesh.position.y = groundY + Math.abs(Math.sin(elapsed * 8)) * 2;
                } else {
                    c.mesh.position.y = groundY;
                }
            }
        }

        function drawRadar() {
            radarCtx.clearRect(0, 0, 100, 100);
            radarCtx.fillStyle = "rgba(74, 222, 128, 0.1)";
            radarCtx.beginPath(); radarCtx.arc(50, 50, 48, 0, Math.PI*2); radarCtx.fill();
            radarCtx.strokeStyle = "#4ade80";
            radarCtx.beginPath(); radarCtx.arc(50, 50, 48, 0, Math.PI*2); radarCtx.stroke();
            radarCtx.fillStyle = "#ffffff";
            radarCtx.beginPath(); radarCtx.arc(50, 50, 3, 0, Math.PI*2); radarCtx.fill();
        }

        function updateCamera() {
            const camDist = 200, camHeight = 140;
            const targetX = snakeHead.position.x - Math.sin(currentRotation) * camDist;
            const targetZ = snakeHead.position.z - Math.cos(currentRotation) * camDist;
            
            camera.position.x += (targetX - camera.position.x) * 0.1;
            camera.position.y += (snakeHead.position.y + camHeight - camera.position.y) * 0.1;
            camera.position.z += (targetZ - camera.position.z) * 0.1;
            camera.lookAt(snakeHead.position.x, snakeHead.position.y + 10, snakeHead.position.z);
        }

        function handleKey(code, isPressed) {
            if(code==='KeyS'||code==='ArrowDown') input.stop = isPressed;
            if(code==='KeyA'||code==='ArrowLeft') input.left = isPressed;
            if(code==='KeyD'||code==='ArrowRight') input.right = isPressed;
            if(code==='Space') input.jump = isPressed;
        }

        function initCompassUI() {
            const s = document.getElementById('compass-strip');
            for(let i=0; i<3; i++) ["N", "·", "E", "·", "S", "·", "W", "·"].forEach(m => {
                const d = document.createElement('div'); d.className='compass-mark'; d.innerText=m; s.appendChild(d);
            });
        }

        function updateCompassUI() {
            const deg = (currentRotation * (180 / Math.PI)) % 360;
            document.getElementById('compass-strip').style.transform = `translateX(${(deg / 360) * 800 - 800}px)`;
            document.getElementById('coord-text').innerText = `X: ${Math.round(snakeHead.position.x)} | Z: ${Math.round(snakeHead.position.z)}`;
        }

        function notify(t) {
            const e = document.getElementById('dialogue'); e.innerText=t; e.style.display='block';
            setTimeout(() => { if(e.innerText===t) e.style.display='none'; }, 3000);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init;
    </script>
</body>
</html>
