<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Ace 1941 - Gempak Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'Press Start 2P', cursive; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 100%; height: 100%; max-width: 450px; background: #001; overflow: hidden; border: 4px solid #444; }
        canvas { display: block; image-rendering: pixelated; }
        .hud { position: absolute; top: 15px; left: 15px; right: 15px; z-index: 10; font-size: 9px; pointer-events: none; }
        .hp-bar { width: 100px; height: 10px; border: 2px solid #fff; background: #222; margin-top: 5px; }
        #hp-fill { height: 100%; background: #0f0; width: 100%; transition: width 0.2s, background-color 0.2s; }
        #boss-ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80%; display: none; text-align: center; }
        .boss-hp { width: 100%; height: 15px; border: 2px solid #ff0; background: #222; }
        #boss-hp-fill { height: 100%; background: #ff0; width: 100%; transition: width 0.2s; }
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        .btn { background: #f8b800; color: #000; padding: 15px; border: 4px solid #fff; cursor: pointer; font-family: inherit; margin-top: 20px; font-size: 12px; box-shadow: 0 5px 0 #a37900; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #a37900; }
        #msg { position: absolute; top: 40%; width: 100%; text-align: center; font-size: 18px; color: #0ff; opacity: 0; transition: 0.5s; pointer-events: none; z-index: 50; text-shadow: 2px 2px #000; }
        .hidden { display: none !important; }
        #pause-text { color: #f8b800; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="game-container">
    <div class="hud">
        SCORE: <span id="score-val">0</span> | STAGE: <span id="lvl-val">1</span>
        <div class="hp-bar"><div id="hp-fill"></div></div>
        <div id="pw-tag" style="margin-top:5px; color:#0ff; font-size: 8px;"></div>
    </div>

    <div id="boss-ui">
        <div style="font-size:10px; color:#ff0; margin-bottom:5px;">WARNING: BOSS APPROACHING</div>
        <div class="boss-hp"><div id="boss-hp-fill"></div></div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div id="msg">STAGE CLEAR</div>

    <div id="start-screen" class="screen">
        <h1 style="color:#f8b800; line-height: 1.5; font-size: 24px; text-shadow: 4px 4px #440000;">SKY ACE<br>1941</h1>
        <p style="font-size: 9px; color:#aaa; margin-top: 15px; line-height: 1.8;">
            ARROW KEYS : Move<br>SPACEBAR : Shoot<br>ESC : Pause Game
        </p>
        <button class="btn" onclick="startGame()">START MISSION</button>
    </div>

    <div id="pause-screen" class="screen hidden">
        <h2 id="pause-text">PAUSED</h2>
        <p style="font-size: 9px; color:#aaa; margin-top: 10px;">Tekan ESC untuk sambung</p>
    </div>

    <div id="game-over" class="screen hidden">
        <h2 style="color:red">MISSION FAILED</h2>
        <p style="font-size: 10px; color:#fff;" id="final-score"></p>
        <button class="btn" onclick="location.reload()">RETRY</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const V_WIDTH = 360, V_HEIGHT = 640;
    
    let gameActive = false, isPaused = false;
    let score = 0, level = 1, keys = {}, shake = 0;
    let bullets = [], enemyBullets = [], enemies = [], powerUps = [], stars = [], particles = [], lastTime = 0;

    // --- AUDIO ENGINE (WEB AUDIO API) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSfx(freq, type, duration, vol=0.1) {
        if (!gameActive || isPaused) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    const sfx = {
        shoot: () => playSfx(440, 'square', 0.1, 0.05),
        exp: () => playSfx(150, 'sawtooth', 0.3, 0.15),
        hit: () => playSfx(100, 'sine', 0.1, 0.1),
        powerup: () => {
            playSfx(600, 'sine', 0.4, 0.1);
            setTimeout(() => playSfx(800, 'sine', 0.4, 0.1), 100);
        }
    };

    // Entiti
    const player = { x: 160, y: 550, w: 35, h: 35, hp: 100, speed: 5, lastShot: 0, shotDelay: 150, pType: 'single', pTimer: 0, iFrames: 0 };
    const boss = { active: false, x: 100, y: -150, w: 140, h: 80, hp: 100, maxHp: 500, speed: 1.5, dir: 1, lastShot: 0, phase: 1 };

    // Sprites
    const playerSprite = ["   2   ", "   1   ", "  121  ", " 11111 ", "1112111", "1  1  1", "   3   "];
    const pColors = {'1': '#5a7c38', '2': '#a0c0a0', '3': '#ffaa00'};
    const enemySprite = [" 1 1 ", "11111", " 121 ", " 111 ", "  3  "];
    const eColors = {'1': '#cc0000', '2': '#ffffff', '3': '#ff5500'};
    const bossSprite = ["   11111   ", "  1122211  ", " 111222111 ", "11111111111", "41113131114", "4 1111111 4", "   1   1   "];
    const bColors = {'1': '#555555', '2': '#222222', '3': '#ff0000', '4': '#aaaaaa'};

    function createExplosion(x, y, color, count = 8) {
        for(let i=0; i<count; i++) {
            particles.push({
                x, y, 
                vx: (Math.random() - 0.5) * 8, 
                vy: (Math.random() - 0.5) * 8, 
                life: 1.0, 
                color
            });
        }
        sfx.exp();
    }

    function drawSprite(matrix, colors, x, y, size) {
        for(let r=0; r<matrix.length; r++) {
            for(let c=0; c<matrix[r].length; c++) {
                let char = matrix[r][c];
                if(char !== ' ') {
                    ctx.fillStyle = colors[char];
                    ctx.fillRect(x + c*size, y + r*size, size, size);
                }
            }
        }
    }

    for(let i=0; i<60; i++) stars.push({x: Math.random()*V_WIDTH, y: Math.random()*V_HEIGHT, s: Math.random()*2+1, sp: Math.random()*3+1});

    function resize() {
        const scale = Math.min(window.innerWidth/V_WIDTH, window.innerHeight/V_HEIGHT);
        canvas.width = V_WIDTH; canvas.height = V_HEIGHT;
        canvas.style.width = (V_WIDTH*scale)+"px"; canvas.style.height = (V_HEIGHT*scale)+"px";
    }
    window.addEventListener('resize', resize); resize();

    window.addEventListener('keydown', e => {
        keys[e.code] = true;
        if (e.code === 'Escape' && gameActive && player.hp > 0) {
            isPaused = !isPaused;
            document.getElementById('pause-screen').classList.toggle('hidden', !isPaused);
            if(!isPaused) lastTime = performance.now();
        }
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    function startGame() { 
        if (audioCtx.state === 'suspended') audioCtx.resume();
        document.getElementById('start-screen').classList.add('hidden'); 
        gameActive = true; 
        player.hp = 100; score = 0; level = 1;
        lastTime = performance.now(); 
        gameLoop(lastTime); 
    }

    function spawnPowerUp(x, y) {
        const types = ['double', 'wide', 'missile', 'rapid', 'boom', 'fire'];
        const type = types[Math.floor(Math.random()*types.length)];
        powerUps.push({ x, y, w: 20, h: 20, type });
    }

    function takeDamage(amount) {
        if (player.iFrames > 0) return;
        player.hp -= amount;
        player.iFrames = 60;
        shake = 10;
        sfx.hit();
        updateHpUI();
        if (player.hp <= 0) {
            gameActive = false;
            document.getElementById('final-score').innerText = "FINAL SCORE: " + score;
            document.getElementById('game-over').classList.remove('hidden');
        }
    }

    function updateHpUI() {
        const hpBar = document.getElementById('hp-fill');
        hpBar.style.width = Math.max(0, player.hp) + '%';
        hpBar.style.background = player.hp > 50 ? '#0f0' : (player.hp > 25 ? '#ff0' : '#f00');
    }

    function fire() {
        const now = Date.now();
        let delay = player.pType === 'rapid' && player.pTimer > now ? 80 : player.shotDelay;
        if (now - player.lastShot < delay) return;

        const type = player.pTimer > now ? player.pType : 'single';
        const px = player.x + player.w/2 - 2;
        
        sfx.shoot();
        if (type === 'single') bullets.push({x: px, y: player.y, w: 4, h: 14, vx: 0, dmg: 10, c: '#ff0'});
        else if (type === 'double') {
            bullets.push({x: player.x+5, y: player.y+10, w: 4, h: 14, vx: 0, dmg: 10, c: '#ff0'});
            bullets.push({x: player.x+player.w-9, y: player.y+10, w: 4, h: 14, vx: 0, dmg: 10, c: '#ff0'});
        }
        else if (type === 'wide') {
            [-3, 0, 3].forEach(vx => bullets.push({x: px, y: player.y, w: 4, h: 12, vx, dmg: 10, c: '#0ff'}));
        }
        else if (type === 'missile') bullets.push({x: px-4, y: player.y, w: 12, h: 24, vx: 0, dmg: 40, c: '#f0f'});
        else if (type === 'rapid') bullets.push({x: px, y: player.y, w: 4, h: 16, vx: 0, dmg: 10, c: '#fff'});
        else if (type === 'fire') {
            for(let i=0; i<2; i++) bullets.push({x: px, y: player.y, w: 8, h: 8, vx: (Math.random()-0.5)*4, dmg: 15, c: i==0?'#f40':'#fa0'});
        }
        player.lastShot = now;
    }

    function update() {
        if(!gameActive || isPaused) return;

        if (player.iFrames > 0) player.iFrames--;
        if (shake > 0) shake *= 0.9;
        
        stars.forEach(s => { s.y += s.sp; if(s.y > V_HEIGHT) s.y = -5; });
        
        // Particles logic
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            if(p.life <= 0) particles.splice(i, 1);
        });

        if(keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
        if(keys['ArrowRight'] && player.x < V_WIDTH - player.w) player.x += player.speed;
        if(keys['ArrowUp'] && player.y > 0) player.y -= player.speed;
        if(keys['ArrowDown'] && player.y < V_HEIGHT - player.h) player.y += player.speed;
        if(keys['Space']) fire();

        bullets.forEach((b, i) => { b.y -= 12; b.x += b.vx; if(b.y < -50) bullets.splice(i, 1); });

        if (level > 0 && level % 5 === 0 && !boss.active) { 
            boss.active = true; boss.maxHp = 400 + (level*100); boss.hp = boss.maxHp; 
            boss.y = -150; boss.x = V_WIDTH/2 - boss.w/2;
            enemies = []; enemyBullets = [];
        }

        if (boss.active) {
            document.getElementById('boss-ui').style.display = 'block';
            if (boss.y < 40) boss.y += 1; 
            boss.x += boss.speed * boss.dir;
            if (boss.x <= 0 || boss.x >= V_WIDTH - boss.w) boss.dir *= -1;
            
            if (boss.y >= 40 && Date.now() - boss.lastShot > 600 - (level*10)) {
                enemyBullets.push({x: boss.x + boss.w*0.2, y: boss.y + boss.h - 10, w: 6, h: 12, vx: -1.5, vy: 5, dmg: 15, c: '#f00'});
                enemyBullets.push({x: boss.x + boss.w*0.8, y: boss.y + boss.h - 10, w: 6, h: 12, vx: 1.5, vy: 5, dmg: 15, c: '#f00'});
                boss.lastShot = Date.now();
            }

            document.getElementById('boss-hp-fill').style.width = (boss.hp / boss.maxHp * 100) + '%';

            bullets.forEach((b, bi) => {
                if (b.x < boss.x + boss.w && b.x + b.w > boss.x && b.y < boss.y + boss.h && b.y + b.h > boss.y) {
                    boss.hp -= b.dmg; bullets.splice(bi, 1);
                    if (boss.hp <= 0) {
                        boss.active = false; score += 5000; level++;
                        createExplosion(boss.x + boss.w/2, boss.y + boss.h/2, '#f00', 30);
                        shake = 20;
                        document.getElementById('boss-ui').style.display = 'none';
                        showMsg("BOSS DESTROYED!");
                        spawnPowerUp(boss.x + boss.w/2, boss.y + boss.h/2);
                        player.hp = Math.min(100, player.hp + 40); updateHpUI();
                    }
                }
            });
        } else {
            if (Math.random() < 0.02 + (level*0.003)) {
                enemies.push({ x: Math.random()*(V_WIDTH-30), y: -50, w: 30, h: 30, speed: 2+level*0.2, hp: 10 + level*2 });
            }
        }

        enemyBullets.forEach((eb, ebi) => {
            eb.y += eb.vy; eb.x += eb.vx;
            if (eb.x < player.x + player.w && eb.x + eb.w > player.x && eb.y < player.y + player.h && eb.y + eb.h > player.y) {
                takeDamage(eb.dmg); enemyBullets.splice(ebi, 1);
            }
            if (eb.y > V_HEIGHT) enemyBullets.splice(ebi, 1);
        });

        enemies.forEach((e, i) => {
            e.y += e.speed;
            if(Math.random() < 0.005) enemyBullets.push({x: e.x + e.w/2, y: e.y + e.h, w: 4, h: 10, vx: 0, vy: 4, dmg: 10, c: '#f40'});

            bullets.forEach((b, bi) => {
                if (b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
                    e.hp -= b.dmg; bullets.splice(bi, 1);
                    if (e.hp <= 0) {
                        score += 100; 
                        createExplosion(e.x + e.w/2, e.y + e.h/2, '#f40');
                        if(Math.random() < 0.1) spawnPowerUp(e.x, e.y);
                        enemies.splice(i, 1);
                        if (score > 0 && score % 2000 === 0 && level % 5 !== 0) { level++; showMsg("STAGE " + level); }
                    }
                }
            });

            if (e.x < player.x + player.w && e.x + e.w > player.x && e.y < player.y + player.h && e.y + e.h > player.y) {
                takeDamage(20); enemies.splice(i, 1);
            }
            if (e.y > V_HEIGHT) enemies.splice(i, 1);
        });

        powerUps.forEach((p, i) => {
            p.y += 2.5;
            if (player.x < p.x+p.w && player.x+player.w > p.x && player.y < p.y+p.h && player.y+player.h > p.y) {
                sfx.powerup();
                if (p.type === 'boom') { 
                    enemies.forEach(e => { score += 50; createExplosion(e.x, e.y, '#fff'); });
                    enemies = []; enemyBullets = []; shake = 15; showMsg("SCREEN CLEAR!"); 
                } else { 
                    player.pType = p.type; player.pTimer = Date.now() + 12000; 
                }
                powerUps.splice(i, 1);
            }
        });

        document.getElementById('score-val').textContent = score;
        document.getElementById('lvl-val').textContent = level;
        document.getElementById('pw-tag').textContent = player.pTimer > Date.now() ? "WEAPON: " + player.pType.toUpperCase() : "";
    }

    function draw() {
        ctx.save();
        if (shake > 0.1) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
        
        ctx.clearRect(0,0,V_WIDTH,V_HEIGHT);
        stars.forEach(s => { ctx.fillStyle = s.sp > 2.5 ? "#fff" : "#888"; ctx.fillRect(s.x, s.y, s.s, s.s); });
        
        particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, 4, 4);
        });
        ctx.globalAlpha = 1.0;

        if (player.iFrames === 0 || Math.floor(Date.now() / 100) % 2 === 0) {
            drawSprite(playerSprite, pColors, player.x, player.y, 5);
        }

        if (boss.active) drawSprite(bossSprite, bColors, boss.x, boss.y, Math.floor(boss.w/11));
        enemies.forEach(e => drawSprite(enemySprite, eColors, e.x, e.y, 6));
        bullets.forEach(b => { ctx.fillStyle = b.c; ctx.fillRect(b.x, b.y, b.w, b.h); });
        enemyBullets.forEach(eb => { ctx.fillStyle = eb.c; ctx.fillRect(eb.x, eb.y, eb.w, eb.h); });

        powerUps.forEach(p => { 
            ctx.fillStyle = '#222'; ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.lineWidth = 2; ctx.strokeStyle = p.type === 'missile' ? '#f0f' : (p.type === 'fire' ? '#f40' : (p.type === 'boom' ? '#f00' : '#0f0'));
            ctx.strokeRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle = ctx.strokeStyle; ctx.font = "12px 'Press Start 2P'"; 
            ctx.fillText(p.type[0].toUpperCase(), p.x+4, p.y+16);
        });
        ctx.restore();

        if (player.hp < 25 && Math.floor(Date.now() / 200) % 2 === 0) {
            ctx.fillStyle = "rgba(255, 0, 0, 0.1)";
            ctx.fillRect(0,0,V_WIDTH, V_HEIGHT);
        }
    }

    function showMsg(t) { 
        const m = document.getElementById('msg'); 
        m.textContent = t; m.style.opacity = 1; 
        setTimeout(()=>m.style.opacity=0, 2000); 
    }

    function gameLoop(t) {
        requestAnimationFrame(gameLoop);
        if(!gameActive) return;
        if (t - lastTime > 1000/60) { 
            update(); 
            if(!isPaused) draw(); 
            lastTime = t; 
        }
    }
</script>
</body>
</html>
